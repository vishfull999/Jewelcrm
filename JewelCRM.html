function gf2ToggleTask(taskId,checked){if(checked)GF_SELECTED_TASKS[taskId]={};else delete GF_SELECTED_TASKS[taskId];}

function gf2TaskRateChange(taskId){
  var rateEl=document.getElementById('gftr_'+taskId);
  var wtEl=document.getElementById('gftw_'+taskId);
  var rate=parseFloat((rateEl||{}).value)||0;
  var amtGold=parseFloat((document.getElementById('gf2_amtgold')||{}).value)||0;
  var wt=rate>0&&amtGold>0?parseFloat((amtGold/rate).toFixed(3)):0;
  if(wtEl)wtEl.textContent=wt>0?fmt(wt,3):'—';
  GF_SELECTED_TASKS[taskId]={rate:rate,wt:wt};
}

function updGF2Calc(){
  var amtRec=parseFloat((document.getElementById('gf2_amtrec')||{}).value)||0;
  var amtGold=parseFloat((document.getElementById('gf2_amtgold')||{}).value)||0;
  var rate=parseFloat((document.getElementById('gf2_rate')||{}).value)||0;
  // Rule: if balance unfixed > 0 and amtGold = 0, set amtGold = amtRec
  if(amtRec>0&&amtGold===0){amtGold=amtRec;var ag=document.getElementById('gf2_amtgold');if(ag)ag.value=amtGold.toFixed(2);}
  // Rule: if amtGold > 0 and rate > 0, compute wt
  var wt=(amtGold>0&&rate>0)?parseFloat((amtGold/rate).toFixed(3)):0;
  var bal=parseFloat((amtRec-amtGold).toFixed(2));
  var wtEl=document.getElementById('gf2_wt');if(wtEl)wtEl.textContent=fmt(wt,3);
  var balEl=document.getElementById('gf2_bal');if(balEl){balEl.textContent=fmtc(Math.abs(bal));balEl.style.color=bal<0?'var(--txd)':bal>0?'var(--txw)':'var(--tx2)';}
}

async function saveGoldFix(id){
  var partyEl=document.getElementById('gf2_party');
  var partyVal=partyEl?partyEl.value:'';
  var partyType='customer',partyId='',partyName='';
  if(partyVal){var pts=partyVal.split(':');partyType=pts[0]==='C'?'customer':'artisan';partyId=pts[1];var pRec=partyType==='customer'?(CACHE.customers||[]).find(function(c){return c.id===partyId;}):(CACHE.artisans||[]).find(function(a){return a.id===partyId;});partyName=(pRec||{}).name||'';}
  else if(id){var ex=GF_LIST.find(function(x){return x.id===id;})||{};partyType=ex.party_type||'customer';partyId=ex.party_id||'';partyName=ex.party_name||'';}
  var amtRec=parseFloat((document.getElementById('gf2_amtrec')||{}).value)||0;
  var amtGold=parseFloat((document.getElementById('gf2_amtgold')||{}).value)||0;
  var rate=parseFloat((document.getElementById('gf2_rate')||{}).value)||0;
  if(amtRec>0&&amtGold===0)amtGold=amtRec;
  var wt=(amtGold>0&&rate>0)?parseFloat((amtGold/rate).toFixed(3)):0;
  var bal=parseFloat((amtRec-amtGold).toFixed(2));
  var body={fix_date2:(document.getElementById('gf2_date')||{}).value||today(),party_type:partyType,party_id:partyId||undefined,party_name:partyName,amount_received:amtRec,amount_to_gold:amtGold,fine_gold_rate:rate,fine_gold_wt:wt,balance_unfixed:bal,notes:(document.getElementById('gf2_notes')||{}).value||null};
  try{
    var savedId=id;
    if(id){await patch('task_gold_fixing',id,body);}
    else{var res=await post('task_gold_fixing',body);savedId=(res&&res[0]&&res[0].id)||null;}
    // Save rate/wt to all checked tasks
    var tids=Object.keys(GF_SELECTED_TASKS);
    for(var i=0;i<tids.length;i++){
      var tid=tids[i];
      var rEl=document.getElementById('gftr_'+tid);
      var tRate=parseFloat((rEl||{}).value)||rate;
      var tWt=(tRate>0&&amtGold>0)?parseFloat((amtGold/tRate).toFixed(3)):wt;
      await patch('tasks',tid,{fine_task_gold_rate:tRate,fine_gold_wt_fixed:tWt,gold_fix_id:savedId}).catch(function(){});
    }
    closeModal();
    GF_LIST=await get('task_gold_fixing','order=created_at.desc');
    renderGoldFixingList();
    toast('Gold fixing saved');
  }catch(e){toast('Error: '+e.message,false);}
}

function updRFormItemFull(sel){
  const opt=sel.options[sel.selectedIndex];if(!opt||!opt.value)return;
  const g=(CACHE.goods||[]).find(x=>x.id===opt.value)||{};
  const catName=opt.getAttribute('data-cat')||'';
  const catLower=(catName||'').toLowerCase();
  const isGold999=catLower.includes('gold');
  const isChain=catLower.includes('chain');
  const isPurityEnabled=isGold999||isChain;
  const unit=opt.getAttribute('data-unit')||g.unit||'gm';
  // Unit badge + label
  const ubdg=document.getElementById('rf_unit_bdg');if(ubdg)ubdg.innerHTML=bdg(unit,'bgi','txi');
  var lblEl=document.getElementById('rf_iss_wt_lbl');if(lblEl)lblEl.textContent='Iss Wt ('+unit+')';
  // Gold/Chain indicator
  const gtag=document.getElementById('rf_gold_tag');
  if(gtag){gtag.textContent=isPurityEnabled?'● '+(isChain?'Chain':'Gold')+' category — purity fields active':'Purity fields for Gold & Chain only';gtag.style.color=isPurityEnabled?'var(--txw)':'var(--tx3)';}
  // Enable/disable purity & wastage fields
  const cpEl=document.getElementById('rf_cpurity');
  const wpEl=document.getElementById('rf_wpurity');
  if(cpEl){cpEl.disabled=!isPurityEnabled;cpEl.style.opacity=isPurityEnabled?'1':'0.4';cpEl.placeholder=isPurityEnabled?'e.g. 916.67':'N/A';
    if(isPurityEnabled&&g.cost_purity&&!parseFloat(cpEl.value))cpEl.value=g.cost_purity;
    if(!isPurityEnabled)cpEl.value='';}
  if(wpEl){wpEl.disabled=!isPurityEnabled;wpEl.style.opacity=isPurityEnabled?'1':'0.4';wpEl.placeholder=isPurityEnabled?'e.g. 2.50':'N/A';
    if(isPurityEnabled&&g.cost_wastage&&!parseFloat(wpEl.value))wpEl.value=g.cost_wastage;
    if(!isPurityEnabled)wpEl.value='';}
  // Default calc_on from master
  const coEl=document.getElementById('rf_calcon');
  const defaultCalcOn=g.default_calc_on||(isPurityEnabled?'fine_wt':'bal_wt');
  if(coEl&&!(WF_RCPT_NEW[R_EDIT_IDX]&&WF_RCPT_NEW[R_EDIT_IDX].calc_on))coEl.value=defaultCalcOn;
  const finalCalcOn=coEl?coEl.value:defaultCalcOn;
  // Default rate: Gold 999 rate if calc_on=fine_wt, else item master rate
  const rateEl=document.getElementById('rf_rate');
  if(rateEl&&(!rateEl.value||parseFloat(rateEl.value)===0)){
    if(finalCalcOn==='fine_wt'){
      var gold999=(CACHE.goods||[]).find(function(x){return (x.name||'').trim().toLowerCase()==='gold 999';});
      if(gold999&&gold999.default_cost_rate)rateEl.value=gold999.default_cost_rate;
      else if(g.default_cost_rate)rateEl.value=g.default_cost_rate;
    }else{
      if(g.default_cost_rate)rateEl.value=g.default_cost_rate;
    }
  }
  updRFormCalc();
}




function rfCalcOnChanged(val){
  var rateEl=document.getElementById('rf_rate');
  if(rateEl&&val==='fine_wt'){
    var gold999=(CACHE.goods||[]).find(function(x){return (x.name||'').trim().toLowerCase()==='gold 999';});
    if(gold999&&gold999.default_cost_rate)rateEl.value=gold999.default_cost_rate;
  }
  updRFormCalc();
}

function updRFormCalc(){
  var issPcsEl=document.getElementById('rf_iss_pcs');
  if(!issPcsEl)return; // receipt form not open — abort
  const issPcs=parseInt(issPcsEl.value)||0;
  const issWt=parseFloat((document.getElementById('rf_iss_wt')||{}).value)||0;
  const retPcs=parseInt((document.getElementById('rf_ret_pcs')||{}).value)||0;
  const retWt=parseFloat((document.getElementById('rf_ret_wt')||{}).value)||0;
  const balPcs=issPcs-retPcs;
  const balWt=parseFloat((issWt-retWt).toFixed(3));
  // Balance displays
  const bpEl=document.getElementById('rf_bal_pcs');if(bpEl)bpEl.textContent=balPcs;
  const bwEl=document.getElementById('rf_bal_wt');
  if(bwEl){bwEl.textContent=fmt(balWt,3);bwEl.style.color=balWt<0?'var(--txd)':'var(--txw)';}
  // Fine weight — Gold/Chain: balWt × (costPurity% + wastPurity%) / 100
  const cpEl=document.getElementById('rf_cpurity');
  const wpEl=document.getElementById('rf_wpurity');
  const isPurityEnabled=cpEl&&!cpEl.disabled&&parseFloat(cpEl.value)>0;
  const costPurity=isPurityEnabled?(parseFloat(cpEl.value)||0):0;
  const wastPurity=isPurityEnabled?(parseFloat((wpEl||{}).value)||0):0;
  const goodEl=document.getElementById('rf_good');
  const checkedOpt=goodEl&&goodEl.querySelector('option:checked');
  const unit=(checkedOpt&&checkedOpt.getAttribute('data-unit'))||'gm';
  const absWt=Math.abs(balWt);
  let fg=0;
  if(isPurityEnabled&&(costPurity+wastPurity)>0){
    // Gold/Chain: fine wt = balWt × (costPurity + wastPurity) / 1000  [purity is in 999.99 scale]
    fg=parseFloat((absWt*(costPurity+wastPurity)/1000).toFixed(3));
  }else if(unit==='ct'){
    fg=parseFloat((absWt/5).toFixed(3));
  }else{
    fg=parseFloat(absWt.toFixed(3));
  }
  const fgEl=document.getElementById('rf_fine');if(fgEl)fgEl.textContent=fmt(fg,3);
  // Amount
  const rate=parseFloat((document.getElementById('rf_rate')||{}).value)||0;
  const calcOnEl=document.getElementById('rf_calcon');
  const calcOn=(calcOnEl&&calcOnEl.value)||'bal_wt';
  const pcsEl=document.getElementById('rf_iss_pcs');
  const pcs=parseInt((pcsEl||{}).value)||0;
  let amt=0;
  if(calcOn==='fine_wt')amt=fg*rate;
  else if(calcOn==='bal_pcs')amt=Math.abs(balPcs)*rate;
  else if(calcOn==='flat')amt=rate;
  else amt=absWt*rate;
  // Apply rounding from goods master
  var goodSel=document.getElementById('rf_good');
  var goodId=goodSel?goodSel.value:'';
  var gMaster=(CACHE.goods||[]).find(function(x){return x.id===goodId;})||{};
  var roundDec=parseInt(gMaster.round_add_to_cost_rate)||2;
  amt=parseFloat(amt.toFixed(roundDec));
  // Gold To Gold: no account ledger effect — show 0 for amount
  var ledgerEl=document.getElementById('rf_ledger');
  var ledgerType=ledgerEl?ledgerEl.value:'gold_to_amount';
  var displayAmt=ledgerType==='gold_to_gold'?0:amt;
  const amtEl=document.getElementById('rf_amt');
  if(amtEl){amtEl.textContent=displayAmt>0?fmtc(displayAmt):'--';amtEl.style.color=ledgerType==='gold_to_gold'?'var(--tx2)':'var(--txs)';}
  // Show gold ledger indicator when Gold To Gold
  var goldLedgerTag=document.getElementById('rf_gold_ledger_tag');
  if(goldLedgerTag)goldLedgerTag.style.display=ledgerType==='gold_to_gold'?'block':'none';
}

function saveRForm(){
  const goodId=document.getElementById('rf_good').value||'';if(!goodId){toast('Select an item',false);return;}
  const goodRec=(CACHE.goods||[]).find(x=>x.id===goodId)||{};
  const opt=document.getElementById('rf_good').querySelector('option:checked');
  const catName=opt==null?undefined:opt.getAttribute('data-cat')||'';
  const isGold999=(catName||'').toLowerCase().includes('gold');
  const isGold=opt==null?undefined:opt.getAttribute('data-gold')==='1';
  const unit=opt==null?undefined:opt.getAttribute('data-unit')||goodRec.unit||'gm';
  const isDiamond=unit==='ct';
  const issPcs=parseInt(document.getElementById('rf_iss_pcs').value)||0;
  const issWt=parseFloat(document.getElementById('rf_iss_wt').value)||0;
  const retPcs=parseInt(document.getElementById('rf_ret_pcs').value)||0;
  const retWt=parseFloat(document.getElementById('rf_ret_wt').value)||0;
  const balPcs=issPcs-retPcs, balWt=parseFloat((issWt-retWt).toFixed(3));
  const cpEl=document.getElementById('rf_cpurity');
  const wpEl=document.getElementById('rf_wpurity');
  const catLower=(catName||'').toLowerCase();
  const isPurityCat=catLower.includes('gold')||catLower.includes('chain');
  const costPurity=isPurityCat?(parseFloat((cpEl==null?undefined:cpEl.value))||null):null;
  const wastPurity=isPurityCat?(parseFloat((wpEl==null?undefined:wpEl.value))||null):null;
  const calcOn=document.getElementById('rf_calcon').value||'bal_wt';
  const ledgerType=(document.getElementById('rf_ledger')||{}).value||'gold_to_amount';
  const rate=parseFloat(document.getElementById('rf_rate').value)||null;
  const absWt=Math.abs(balWt);
  // Fine weight formula:
  // Gold/Chain: fg = balWt × (costPurity% + wastPurity%) / 1000  [purity in 999.99 scale]
  // Diamond (ct): fg = balWt / 5
  // Others: fg = balWt
  let fg=0;
  if(isPurityCat&&costPurity!=null&&(costPurity+(wastPurity||0))>0){
    fg=parseFloat((absWt*(costPurity+(wastPurity||0))/1000).toFixed(3));
  }else if(isDiamond){
    fg=parseFloat((absWt/5).toFixed(3));
  }else{
    fg=parseFloat(absWt.toFixed(3));
  }
  let amt=0;
  if(calcOn==='fine_wt')amt=parseFloat((fg*(rate||0)).toFixed(2));
  else if(calcOn==='bal_pcs')amt=parseFloat((Math.abs(balPcs)*(rate||0)).toFixed(2));
  else if(calcOn==='flat')amt=rate||0;
  else amt=parseFloat((absWt*(rate||0)).toFixed(2));
  const line={
    good_id:goodId,item_name:goodRec.name||'',
    item_category:catName||'',
    artisan_id:document.getElementById('rf_artisan_id').value||document.getElementById('rf_artisan').value||WF_CUR.artisan_id||null,
    txn_date:document.getElementById('rf_date').value||today(),
    txn_type:document.getElementById('rf_type').value||'return',
    owner:document.getElementById('rf_owner').value||'artisan',
    issued_pcs:issPcs,issued_wt:issWt,
    return_pcs:retPcs,return_wt:retWt,
    pcs:retPcs,wt_returned:retWt,
    balance_pcs:balPcs,balance_wt:balWt,
    unit,_isGold:isGold,_isGold999:isGold999,_isDiamond:isDiamond,
    cost_purity:costPurity,cost_wastage_purity:wastPurity,
    calc_on:calcOn,cost_rate:rate,cost_amount:amt,cost_fine_gold:fg,
    ledger_type:ledgerType,
    ledger_effect:ledgerType==='gold_to_gold'?false:!!(rate&&amt>0)
  };
  if(R_EDIT_IDX>=0)WF_RCPT_NEW[R_EDIT_IDX]=line;
  else WF_RCPT_NEW.push(line);
  closeModal();renderRcptList();buildS4Summary();updS4Calc();
}

// Open receipt form pre-populated from grid row data (works for both goods and artisan sources)
function openRcptFormFromGrid(gi){
  const row=WF_GRID_DATA[gi];if(!row)return;
  if(row.source==='artisan'){
    openRcptForm(row._ri);
    return;
  }
  // For goods-source rows, build a temporary WF_RCPT_NEW-style object and open as edit
  const tmpIdx=WF_RCPT_NEW.length;
  // Find existing artisan receipt line matching this goods item, or create synthetic one
  const existing=WF_RCPT_NEW.findIndex(r=>r.good_id===row.good_id&&r.txn_type===row.txn_type);
  if(existing>=0){openRcptForm(existing);return;}
  // Synthetic: push a pre-filled entry so the form can edit it
  WF_RCPT_NEW.push({
    good_id:row.good_id,item_name:row.item_name,
    artisan_id:(_g&&_g.artisan_id)||WF_CUR.artisan_id,
    txn_date:row.date||today(),
    txn_type:row.txn_type||'issue',
    owner:row.owner||'stock',
    issued_pcs:row.issued_pcs,issued_wt:row.issued_wt,
    return_pcs:row.return_pcs,return_wt:row.return_wt,
    pcs:row.return_pcs,wt_returned:row.return_wt,
    balance_pcs:row.balance_pcs,balance_wt:row.balance_wt,
    unit:row.unit,_isGold:(_g&&_g._isGold)||false,
    _isGold999:(_g&&_g._isGold999)||false,
    item_category:(_g&&_g.item_category)||'',
    cost_purity:row.cost_purity,cost_wastage_purity:row.cost_wastage_purity,
    calc_on:row.calc_on,cost_rate:row.cost_rate,cost_amount:row.cost_amount,
    cost_fine_gold:row.fine_wt_gm,ledger_effect:false,source:'goods_edit'
  });
  openRcptForm(tmpIdx);
}

function buildS4Summary(){
  var el=document.getElementById('s4_summary');
  if(!el)return;

  // Stage 3 issued goods — Stock & Artisan owners only
  var goods3=(WF_GOODS||[]).filter(function(g){return g.owner==='stock'||g.owner==='artisan';});
  // Stage 4 returned goods — Artisan owner only (WF_RCPT_NEW already filtered to artisan)
  var goods4=(WF_RCPT_NEW||[]);

  function bucket(cat){
    var n=(cat||'').trim().toLowerCase();
    if(!n)return'Others';
    if(n==='gold')return'Gold';
    if(n==='chain')return'Chain';
    if(n==='diamond')return'Diamond';
    if(n==='others')return'Others';
    if(n==='making')return'Making';
    if(n==='pearl'||n.includes('pearl'))return'Pearls';
    if(n.includes('colour')||n.includes('color')||n.includes('stone')||n.includes('precious'))return'ColourStone';
    if(n.includes('gold'))return'Gold';
    if(n.includes('chain'))return'Chain';
    if(n.includes('diamond'))return'Diamond';
    if(n.includes('making')||n.includes('labour'))return'Making';
    return'Others';
  }

  var T={Gold:{wt:0,fg:0,amt:0},Chain:{wt:0,fg:0,amt:0},Diamond:{wt:0,fg:0,amt:0},
         ColourStone:{wt:0,fg:0,amt:0},Pearls:{wt:0,fg:0,amt:0},
         Others:{wt:0,fg:0,amt:0},Making:{wt:0,fg:0,amt:0}};

  // WF_GOODS: bal wt = weight_issued - weight_returned
  goods3.forEach(function(g){
    var b=bucket(g.item_category||g.category_name||'');
    var iss=parseFloat(g.weight_issued||0)||0;
    var ret=parseFloat(g.weight_returned||0)||0;
    var balWt=parseFloat((iss-ret).toFixed(3));
    var fg=parseFloat(g.fine_wt_gm||g.cost_fine_gold||0)||0;
    var amt=parseFloat(g.amount||g.cost_amount||0)||0;
    if(T[b]){T[b].wt+=balWt;T[b].fg+=fg;T[b].amt+=amt;}
  });

  // WF_RCPT_NEW: wt_returned = net returned weight from artisan
  goods4.forEach(function(g){
    var b=bucket(g.item_category||g.category_name||'');
    var balWt=parseFloat(g.wt_returned||g.balance_wt||0)||0;
    var fg=parseFloat(g.cost_fine_gold||g.fine_wt_gm||0)||0;
    var amt=parseFloat(g.cost_amount||0)||0;
    if(T[b]){T[b].wt+=balWt;T[b].fg+=fg;T[b].amt+=amt;}
  });

  // Totals
  var X=T.Gold.wt+T.Chain.wt+T.Diamond.wt+T.ColourStone.wt+T.Pearls.wt+T.Others.wt;
  var Y=T.Gold.fg+T.Chain.fg+T.Diamond.fg+T.ColourStone.fg+T.Pearls.fg+T.Others.fg;
  var Z=T.Gold.amt+T.Chain.amt+T.Diamond.amt+T.ColourStone.amt+T.Pearls.amt+T.Others.amt+T.Making.amt;

  function vw(n){return n>0?'<b class="mono" style="font-size:12px">'+parseFloat(n.toFixed(3))+'</b>':'<span style="color:var(--tx3)">—</span>';}
  function vf(n){return n>0?'<b class="mono" style="font-size:12px;color:var(--txw)">'+parseFloat(n.toFixed(3))+'</b>':'<span style="color:var(--tx3)">—</span>';}
  function va(n){return n>0?'<b class="mono" style="font-size:12px;color:var(--txs)">₹'+parseFloat(n.toFixed(2))+'</b>':'<span style="color:var(--tx3)">—</span>';}

  var BD='.5px solid var(--bdr)';
  var BDT='border-top:2px solid var(--bdrw)';
  var TH='padding:4px 8px;text-align:center;font-size:10px;font-weight:700;background:var(--bg3);border:'+BD+';white-space:nowrap;color:var(--tx)';
  var LB='padding:4px 8px;font-size:10px;font-weight:600;color:var(--tx2);background:var(--bg2);border:'+BD+';white-space:nowrap';
  var DT='padding:4px 10px;text-align:right;border:'+BD;

  function sec(hdr1,hdr2,hdr3,wtA,fgI,amtA, wtB,fgJ,amtB, wtC,fgK,amtC,divTop){
    var bt=divTop?BDT:'';
    return '<thead><tr style="'+(bt||'')+'">'
      +'<td style="'+TH+'"></td>'
      +'<th style="'+TH+'">'+hdr1+'</th>'
      +'<th style="'+TH+'">'+hdr2+'</th>'
      +'<th style="'+TH+'">'+hdr3+'</th>'
      +'</tr></thead>'
      +'<tbody>'
      +'<tr><td style="'+LB+'">Gross</td><td style="'+DT+'">'+vw(wtA)+'</td><td style="'+DT+'">'+vw(wtB)+'</td><td style="'+DT+'">'+vw(wtC)+'</td></tr>'
      +'<tr><td style="'+LB+'">Fine</td><td style="'+DT+'">'+vf(fgI)+'</td><td style="'+DT+'">'+vf(fgJ)+'</td><td style="'+DT+'">'+vf(fgK)+'</td></tr>'
      +'<tr><td style="'+LB+'">Amount</td><td style="'+DT+'">'+va(amtA)+'</td><td style="'+DT+'">'+va(amtB)+'</td><td style="'+DT+'">'+va(amtC)+'</td></tr>'
      +'</tbody>';
  }

  var TH2='padding:4px 8px;text-align:center;font-size:10px;font-weight:700;background:var(--bg3);border:'+BD+';white-space:nowrap;color:var(--txs)';

  el.innerHTML='<div style="overflow-x:auto">'
    +'<table style="width:100%;border-collapse:collapse;font-size:11px">'

    // Section 1: Gold | Chain | Diamond
    +sec('Gold','Chain','Dia Wt.',
         T.Gold.wt,T.Gold.fg,T.Gold.amt,
         T.Chain.wt,T.Chain.fg,T.Chain.amt,
         T.Diamond.wt,T.Diamond.fg,T.Diamond.amt,
         false)

    // Section 2: Colour Stone | Pearls | Others
    +sec('C.Stone','Pearls','Others',
         T.ColourStone.wt,T.ColourStone.fg,T.ColourStone.amt,
         T.Pearls.wt,T.Pearls.fg,T.Pearls.amt,
         T.Others.wt,T.Others.fg,T.Others.amt,
         true)

    // Section 3: Making (spans 3rd col only)
    +'<thead><tr style="'+BDT+'">'
    +'<td style="'+TH+'"></td><td style="'+TH+'"></td><td style="'+TH+'"></td>'
    +'<th style="'+TH+'">Making</th>'
    +'</tr></thead>'
    +'<tbody>'
    +'<tr><td style="'+LB+'">Gross</td><td style="'+DT+'"></td><td style="'+DT+'"></td><td style="'+DT+'">'+vw(T.Making.wt)+'</td></tr>'
    +'<tr><td style="'+LB+'">Fine</td><td style="'+DT+'"></td><td style="'+DT+'"></td><td style="'+DT+'">'+vf(T.Making.fg)+'</td></tr>'
    +'<tr><td style="'+LB+'">Amount</td><td style="'+DT+'"></td><td style="'+DT+'"></td><td style="'+DT+'">'+va(T.Making.amt)+'</td></tr>'
    +'</tbody>'

    // Totals row
    +'<tfoot><tr style="'+BDT+'">'
    +'<td style="'+LB+';font-weight:700;font-size:11px;color:var(--tx)">Total</td>'
    +'<td style="'+DT+';background:var(--bg2)">'+vw(X)+'<div style="font-size:9px;color:var(--tx3)">Gross (X)</div></td>'
    +'<td style="'+DT+';background:var(--bg2)">'+vf(Y)+'<div style="font-size:9px;color:var(--tx3)">Fine (Y)</div></td>'
    +'<td style="'+DT+';background:var(--bg2)">'+va(Z)+'<div style="font-size:9px;color:var(--tx3)">Amount (Z)</div></td>'
    +'</tr></tfoot>'
    +'</table></div>';

  updS4Calc();
}











async function saveReceipt(adv){

    const awasEl=document.getElementById('f_awas');
    const rgwtEl=document.getElementById('f_rgwt');
    const rpcsEl=document.getElementById('f_rpcs');
    const rnotesEl=document.getElementById('f_rnotes');

    if(adv)taskUpd.status='ready_delivery';
    await patch('tasks',WF_CUR.id,taskUpd);
    // Save artisan-added receipt lines
    await delW('task_receipt_lines','task_id',WF_CUR.id);
    for(const r of WF_RCPT_NEW){
      if(!r.item_name)continue;
      await post('task_receipt_lines',{
        task_id:WF_CUR.id,
        good_id:r.good_id||null,
        item_name:r.item_name,
        item_category:r.item_category||'',
        unit:r.unit||'gm',
        txn_type:r.txn_type||'return',
        owner:r.owner||'artisan',
        pcs_issued:r.issued_pcs||0,
        wt_issued:parseFloat(r.issued_wt||r.issued_wt||0)||0,
        pcs_returned:r.return_pcs||r.pcs||0,
        wt_returned:parseFloat(r.wt_returned||r.return_wt||0)||0,
        wt_consumed:parseFloat(r.wt_returned||r.return_wt||0)||0,
        cost_purity:r.cost_purity||null,
        cost_fine_gold:parseFloat(r.cost_fine_gold||0)||null,
        cost_rate:parseFloat(r.cost_rate||0)||null,
        cost_amount:parseFloat(r.cost_amount||0)||0,
        artisan_purchased:r.owner==='artisan',
        artisan_purchase_amount:parseFloat(r.cost_amount||0)||0,
        ledger_type:r.ledger_type||'gold_to_amount',
        ledger_effect:r.ledger_type==='gold_to_gold'?false:!!(r.cost_rate&&r.cost_amount>0),
        ledger_amount:r.ledger_type==='gold_to_gold'?0:parseFloat(r.cost_amount||0)||0
      });
    }
    WF_CUR=Object.assign({},WF_CUR,taskUpd);
    if(adv)WF_STAGE=4;
    WF_TASKS=await get('v_task_summary','order=receive_date.desc');
    renderWfTopbar();renderStageBar();renderStageContent();
    toast(adv?'Moved to Prepare Delivery':'Receipt saved');
  }catch(e){toast('Error: '+e.message,false);}
}

function buildS5Lines(){
  if(!WF_SALE5.length){
    if(!WF_GRID_DATA.length)buildGridData();
    const groups={};
    WF_GRID_DATA.forEach(row=>{
      const artId=(row.artisan_id)||WF_CUR.artisan_id||'';
      const key=`${row.item_name}||${row.owner}||${artId}`;
      if(!groups[key]){
        // Look up master goods record for sale defaults
        const gM=(CACHE.goods||[]).find(x=>x.id===row.good_id)||{};
        const sc=CACHE.subcategories.find(s=>s.id===gM.subcategory_id)||{};
        const cat=CACHE.categories.find(c=>c.id===sc.category_id)||{};
        const isGold=(cat.name||row.item_name||'').toLowerCase().includes('gold');
        // Purity defaults for Gold items
        let salePurity='', saleWastage='';
        if(isGold){
          const masterSalePurity=parseFloat(gM.sale_purity)||0;
          const masterCostPurity=parseFloat(row.cost_purity)||0;
          salePurity=masterSalePurity>0?masterSalePurity:(masterCostPurity>0?masterCostPurity:'');
          const masterSaleWastage=parseFloat(gM.sale_wastage)||0;
          const masterCostWastage=parseFloat(row.cost_wastage_purity)||0;
          saleWastage=masterSaleWastage>0?masterSaleWastage:(masterCostWastage>0?masterCostWastage:'');
        }
        // Sale rate: Part A logic with markup fallback
        const isStock=(row.owner||'stock')==='stock';
        const masterSaleRate=parseFloat(gM.default_sale_rate)||0;
        const addRatePct=parseFloat(gM.add_to_cost_rate_pct)||0;
        const roundRate=parseInt(gM.round_add_to_cost_rate);
        const addAmtPct=parseFloat(gM.add_to_cost_amt_pct)||0;
        const costRate=parseFloat(row.cost_rate)||0;
        let saleRate=0;
        if(isStock){
          if(masterSaleRate>0){
            saleRate=masterSaleRate;
          } else if(addRatePct>0){
            const raw=costRate*(1+addRatePct/100);
            saleRate=isNaN(roundRate)?Math.round(raw):parseFloat(raw.toFixed(roundRate));
          }
          // addAmtPct handled after totals are summed
        }
        groups[key]={
          item_name:row.item_name,owner:row.owner,artisan_id:artId,
          good_id:row.good_id||(_g&&_g.good_id)||(_r&&_r.good_id)||'',
          _gM:gM, // store master ref for post-total calculations
          is_gold:isGold,unit:row.unit,
          cost_purity:row.cost_purity,cost_wastage_purity:row.cost_wastage_purity,
          calc_on:row.calc_on,cost_rate:costRate,
          bal_pcs:0,bal_wt:0,cost_fine_wt:0,cost_amount:0,
          sale_pcs:'',sale_wt:'',
          sale_purity:salePurity,sale_wastage_purity:saleWastage,
          sale_fine_wt:'',sale_calc_on:isGold?'fine_wt':'bal_wt',
          sale_rate:saleRate,sale_amount:''
        };
      }
      groups[key].bal_pcs+=row.balance_pcs;
      groups[key].bal_wt=parseFloat((groups[key].bal_wt+row.balance_wt).toFixed(3));
      groups[key].cost_fine_wt=parseFloat((groups[key].cost_fine_wt+(parseFloat(row.fine_wt_gm)||0)).toFixed(3));
      groups[key].cost_amount=parseFloat((groups[key].cost_amount+(parseFloat(row.cost_amount)||0)).toFixed(2));
    });
    WF_SALE5=Object.values(groups);
    // After totals are summed, set Sale Pcs/Wt and apply markup logic
    WF_SALE5.forEach(l=>{
      if(!l.sale_pcs||l.sale_pcs==='')l.sale_pcs=l.bal_pcs;
      if(!l.sale_wt||l.sale_wt==='')l.sale_wt=l.bal_wt;
      const gM=l._gM||{};
      // Apply full markup logic only for Stock/Artisan owners
      if((l.owner==='stock'||l.owner==='artisan')&&!parseFloat(l.sale_rate)){
        const markup=calcMarkupSaleRate(gM,l.cost_rate,l.cost_amount,l.bal_wt,l.bal_pcs,l.calc_on);
        if(markup.sale_rate>0){l.sale_rate=markup.sale_rate;l.sale_amount=markup.sale_amount;}
      }
      // Compute sale fine wt from sale purity
      const swt=parseFloat(l.sale_wt)||0;
      const spur=parseFloat(l.sale_purity)||null;
      const swas=parseFloat(l.sale_wastage_purity)||0;
      if(l.is_gold&&spur){l.sale_fine_wt=parseFloat((swt*(spur-swas)/1000).toFixed(3));}
      else{l.sale_fine_wt=l.is_gold?l.cost_fine_wt:swt;}
      // Compute initial sale amount if not already set via addAmtPct
      if(!parseFloat(l.sale_amount)){
        const rate=parseFloat(l.sale_rate)||0;
        if(rate>0){
          const fg=parseFloat(l.sale_fine_wt)||0;
          const pcs=parseInt(l.sale_pcs)||0;
          if(l.sale_calc_on==='fine_wt')l.sale_amount=parseFloat((fg*rate).toFixed(2));
          else if(l.sale_calc_on==='bal_pcs')l.sale_amount=parseFloat((pcs*rate).toFixed(2));
          else if(l.sale_calc_on==='flat')l.sale_amount=rate;
          else l.sale_amount=parseFloat((swt*rate).toFixed(2));
        }
      }
    });
    // Merge existing saved WF_SALE data (overrides defaults if already saved)
    if(WF_SALE.length){
      WF_SALE.forEach(old=>{
        const match=WF_SALE5.find(l=>l.item_name===old.item_name&&l.owner===(old.owner||'stock'));

function updS5(i,k,v){if(WF_SALE5[i])WF_SALE5[i][k]=v;}
function updS5SaleCalc(i,v,type){
  if(!WF_SALE5[i])return;
  if(type==='wt')WF_SALE5[i].sale_wt=v;
  if(type==='purity')WF_SALE5[i].sale_purity=v;
  if(type==='wastage')WF_SALE5[i].sale_wastage_purity=v;
  const l=WF_SALE5[i];
  const wt=parseFloat(l.sale_wt)||0;
  const pur=parseFloat(l.sale_purity)||null;
  const was=parseFloat(l.sale_wastage_purity)||0;
  let fg=null;
  if(pur){const netPur=pur-was;fg=parseFloat((wt*netPur/1000).toFixed(3));}
  WF_SALE5[i].sale_fine_wt=fg;
  const fgEl=document.getElementById('s5sfg_'+i);if(fgEl)fgEl.textContent=fg!=null?fmt(fg,3):'--';
  updS5Amt(i,'s',l.sale_rate);
  updS5Totals();
}
function updS5Amt(i,side,rateVal){
  if(!WF_SALE5[i])return;
  const l=WF_SALE5[i];
  const rate=parseFloat(rateVal)||0;
  if(side==='s'){
    l.sale_rate=rateVal;
    const calcOn=l.sale_calc_on||'bal_wt';
    const wt=parseFloat(l.sale_wt||l.bal_wt)||0;
    const fg=parseFloat(l.sale_fine_wt)||0;
    const pcs=parseInt(l.sale_pcs||l.bal_pcs)||0;
    let amt=0;
    if(calcOn==='fine_wt')amt=parseFloat((fg*rate).toFixed(2));
    else if(calcOn==='bal_pcs')amt=parseFloat((pcs*rate).toFixed(2));
    else if(calcOn==='flat')amt=rate;
    else amt=parseFloat((wt*rate).toFixed(2));
    l.sale_amount=amt;
    const el=document.getElementById('s5sa_'+i);if(el)el.textContent=amt>0?fmtc(amt):'--';
  }else{
    l.cost_rate=rateVal;
    const calcOn=l.calc_on||'bal_wt';
    const wt=parseFloat(l.bal_wt)||0;
    const fg=parseFloat(l.cost_fine_wt)||0;
    const pcs=parseInt(l.bal_pcs)||0;
    let amt=0;
    if(calcOn==='fine_wt')amt=parseFloat((fg*rate).toFixed(2));
    else if(calcOn==='bal_pcs')amt=parseFloat((pcs*rate).toFixed(2));
    else if(calcOn==='flat')amt=rate;
    else amt=parseFloat((wt*rate).toFixed(2));
    l.cost_amount=amt;
    const el=document.getElementById('s5ca_'+i);if(el)el.textContent=amt>0?fmtc(amt):'--';
  }
  updS5Totals();
}

function updS5Form(sel){
  const opt=sel.options[sel.selectedIndex];if(!(opt==null?undefined:opt.value))return;
  const isGold=opt.getAttribute('data-gold')==='1';
  const unit=opt.getAttribute('data-unit')||'gm';
  const el=document.getElementById('s5f_unitbdg');if(el)el.innerHTML=bdg(unit,'bgi','txi');
  const cpEl=document.getElementById('s5f_cpurity');
  const cwEl=document.getElementById('s5f_cwastage');
  const spEl=document.getElementById('s5f_spurity');
  const swEl=document.getElementById('s5f_swastage');
  const crEl=document.getElementById('s5f_crate');
  const srEl=document.getElementById('s5f_srate');
  const scEl=document.getElementById('s5f_cCalcOn');
  const ssEl=document.getElementById('s5f_sCalcOn');
  if(cpEl&&isGold){cpEl.value=opt.getAttribute('data-cpurity')||'';cpEl.disabled=false;cpEl.style.opacity='1';}
  else if(cpEl){cpEl.value='';cpEl.disabled=true;cpEl.style.opacity='0.4';}
  if(cwEl&&isGold){cwEl.value=opt.getAttribute('data-cwastage')||'';cwEl.disabled=false;cwEl.style.opacity='1';}
  else if(cwEl){cwEl.value='';cwEl.disabled=true;cwEl.style.opacity='0.4';}
  if(spEl&&isGold){spEl.value=opt.getAttribute('data-spurity')||opt.getAttribute('data-cpurity')||'';spEl.disabled=false;spEl.style.opacity='1';}
  else if(spEl){spEl.value='';spEl.disabled=true;spEl.style.opacity='0.4';}
  if(swEl&&isGold){swEl.value=opt.getAttribute('data-swastage')||opt.getAttribute('data-cwastage')||'';swEl.disabled=false;swEl.style.opacity='1';}
  else if(swEl){swEl.value='';swEl.disabled=true;swEl.style.opacity='0.4';}
  if(crEl&&(!crEl.value||parseFloat(crEl.value)===0))crEl.value=opt.getAttribute('data-crate')||'';
  if(srEl&&(!srEl.value||parseFloat(srEl.value)===0))srEl.value=opt.getAttribute('data-srate')||opt.getAttribute('data-crate')||'';
  if(scEl)scEl.value=isGold?'fine_wt':'bal_wt';
  if(ssEl)ssEl.value=isGold?'fine_wt':'bal_wt';
  updS5FormCalc();
}

function updS5FormCalc(){
  const bwt=parseFloat(document.getElementById('s5f_bwt').value)||0;
  const bpcs=parseInt(document.getElementById('s5f_bpcs').value)||0;
  const cp=parseFloat(document.getElementById('s5f_cpurity').value)||null;
  const cw=parseFloat(document.getElementById('s5f_cwastage').value)||0;
  const cfg=cp?parseFloat(((bwt*(cp-cw))/1000).toFixed(3)):null;
  const ccalcOn=document.getElementById('s5f_cCalcOn').value||'bal_wt';
  const cr=parseFloat(document.getElementById('s5f_crate').value)||0;
  let camt=0;
  if(ccalcOn==='fine_wt')camt=parseFloat(((cfg||0)*cr).toFixed(2));
  else if(ccalcOn==='bal_pcs')camt=parseFloat((bpcs*cr).toFixed(2));
  else if(ccalcOn==='flat')camt=cr;
  else camt=parseFloat((bwt*cr).toFixed(2));
  const cfgEl=document.getElementById('s5f_cfg');if(cfgEl)cfgEl.textContent=cfg!=null?fmt(cfg,3)+' gm':'--';
  const camtEl=document.getElementById('s5f_camt');if(camtEl)camtEl.textContent=camt>0?fmtc(camt):'--';
  const swt=parseFloat(document.getElementById('s5f_swt').value)||bwt;
  const spcs=parseInt(document.getElementById('s5f_spcs').value)||bpcs;
  const sp=parseFloat(document.getElementById('s5f_spurity').value)||null;
  const sw=parseFloat(document.getElementById('s5f_swastage').value)||0;
  const sfg=sp?parseFloat(((swt*(sp-sw))/1000).toFixed(3)):null;
  const scalcOn=document.getElementById('s5f_sCalcOn').value||'bal_wt';
  const sr=parseFloat(document.getElementById('s5f_srate').value)||0;
  let samt=0;
  if(scalcOn==='fine_wt')samt=parseFloat(((sfg||0)*sr).toFixed(2));
  else if(scalcOn==='bal_pcs')samt=parseFloat((spcs*sr).toFixed(2));
  else if(scalcOn==='flat')samt=sr;
  else samt=parseFloat((swt*sr).toFixed(2));
  const sfgEl=document.getElementById('s5f_sfg');if(sfgEl)sfgEl.textContent=sfg!=null?fmt(sfg,3)+' gm':'--';
  const samtEl=document.getElementById('s5f_samt');if(samtEl)samtEl.textContent=samt>0?fmtc(samt):'--';
}

// Build Stage 6 delivery lines using Part A sale rate logic
function buildS6Lines(){
  if(!WF_SALE5.length)buildS5Lines();
  const artName=id=>(CACHE.artisans||[]).find(a=>a.id===id).name||'--';
  return WF_SALE5.map(l=>{
    const gM=(CACHE.goods||[]).find(x=>x.id===l.good_id)||{};
    const addRatePct=parseFloat(gM.add_to_cost_rate_pct)||0;
    const roundRate=parseInt(gM.round_add_to_cost_rate);
    const addAmtPct=parseFloat(gM.add_to_cost_amt_pct)||0;
    const roundAmt=parseInt(gM.round_add_to_cost_amt);
    const masterSaleRate=parseFloat(gM.default_sale_rate)||0;
    const s3Good=WF_GOODS.find(g=>g.good_id===l.good_id&&g.owner===l.owner);
    const s3SaleRate=parseFloat((s3Good==null?undefined:s3Good.sale_rate))||0;
    let saleRate=0;
    if(s3SaleRate>0){saleRate=s3SaleRate;}
    else if(masterSaleRate>0){saleRate=masterSaleRate;}
    else if(addRatePct>0){
      const raw=(parseFloat(l.cost_rate)||0)*(1+addRatePct/100);
      saleRate=isNaN(roundRate)?Math.round(raw):parseFloat(raw.toFixed(roundRate));
    }else if(addAmtPct>0){
      const rawAmt=(parseFloat(l.cost_amount)||0)*(1+addAmtPct/100);
      const saleAmt=isNaN(roundAmt)?Math.round(rawAmt):parseFloat(rawAmt.toFixed(roundAmt));
      const wt=parseFloat(l.sale_wt||l.bal_wt)||0;
      saleRate=wt>0?parseFloat((saleAmt/wt).toFixed(2)):0;
    }
    // Sale amount
    const swt=parseFloat(l.sale_wt||l.bal_wt)||0;
    const sfg=parseFloat(l.sale_fine_wt||l.cost_fine_wt)||0;
    const spcs=parseInt(l.sale_pcs||l.bal_pcs)||0;
    const calcOn=l.sale_calc_on||'bal_wt';
    let saleAmt=0;
    if(calcOn==='fine_wt')saleAmt=parseFloat((sfg*saleRate).toFixed(2));
    else if(calcOn==='bal_pcs')saleAmt=parseFloat((spcs*saleRate).toFixed(2));
    else if(calcOn==='flat')saleAmt=saleRate;
    else saleAmt=parseFloat((swt*saleRate).toFixed(2));
    return Object.assign({},l,{sale_rate:saleRate,sale_amount:saleAmt,
      artisan_name:artName(l.artisan_id)});
  });
}

function fmtIN(n,dec){if(n==null||n==='')return '';dec=dec||2;const parts=parseFloat(n).toFixed(dec).split('.');let ip=parts[0];const dp=parts[1];if(ip.length>3){const l=ip.slice(-3);const r=ip.slice(0,-3);ip=r.replace(/\B(?=(\d{2})+(?!\d))/g,',')+','+l;}return dec>0?ip+'.'+dp:ip;}
function parseIN(s){return parseFloat((s||'').replace(/,/g,''))||0;}

function newGoldReceipt(){
  WF_RCPT_HDR={date:today(),party_type:'customer',party_id:null,party_name:'',gold_wt:null,purity:null,fine_wt:null,rate:null,amount:null,concept:'open',notes:''};
  WF_RCPT_LINES=[];WF_RCPT_ID=null;
  renderReceiptForm();
}

async function editGoldReceipt(id){
  try{
    const _gr=await Promise.all([
      get('gold_receipts',`id=eq.${id}`),
      get('gold_receipt_lines',`receipt_id=eq.${id}&order=sort_order.asc`)
    ]);
    const hdrs=_gr[0],lines=_gr[1];
    const h=hdrs[0];if(!h)return;
    WF_RCPT_ID=id;
    WF_RCPT_HDR={date:h.receipt_date,party_type:h.party_type,party_id:h.party_id,party_name:h.party_name,
      gold_wt:h.receipt_gold_wt,purity:h.receipt_purity,fine_wt:h.receipt_fine_wt,
      rate:h.receipt_rate,amount:h.receipt_amount,concept:h.rate_concept,notes:h.notes||''};
    WF_RCPT_LINES=(lines||[]).map(function(l){return Object.assign({},l,{_id:l.id});});
    renderReceiptForm();
  }catch(e){toast('Error loading receipt: '+e.message,false);}
}

async function deleteGoldReceipt(id){
  if(!confirm('Delete this receipt and all its lines? Cannot be undone.'))return;
  try{
    await del('gold_receipts',id);
    toast('Receipt deleted');wfReceipts();
  }catch(e){toast('Error: '+e.message,false);}
}

function updRcptLine(i,field,val){
  const l=WF_RCPT_LINES[i];if(!l)return;
  l[field]=val;
  // Auto-calc fine gold received
  if(field==='gold_wt_received'||field==='gold_purity_received'){
    const wt=parseFloat(l.gold_wt_received)||0;
    const pur=parseFloat(l.gold_purity_received)||0;
    if(wt>0&&pur>0)l.fine_gold_received=parseFloat((wt*pur/1000).toFixed(3));
  }
  renderRcptLinesGrid();
}

function removeRcptLine(i){
  WF_RCPT_LINES.splice(i,1);
  renderRcptLinesGrid();
}

  const prevMap={};(prevSummary||[]).forEach(r=>{prevMap[r.task_id]={prev_fine:parseFloat(r.prev_fine_wt_received)||0,prev_amt:parseFloat(r.prev_amount_received)||0,avg_rate:r.avg_fine_rate?parseFloat(r.avg_fine_rate):null};});

function addRcptLineFromTask(t){
  // Check not already added
  if(WF_RCPT_LINES.find(l=>l.task_id===t.id)){toast('This task is already in the grid',false);return;}
  const prev={prev_fine:t.prev_fine_wt||0,prev_amt:t.prev_amount||0};
  WF_RCPT_LINES.push({
    task_id:t.id, task_code:t.task_code, task_photo:t.task_photo,
    item_weight:t.item_weight, estimate_fine_wt:t.estimate_fine_wt,
    gold_wt_received:null, gold_purity_received:t.estimate_purity||null, fine_gold_received:null,
    gold_amount_conversion:false, receipt_amount:null, rate_fixed:false, fixed_rate:null, sort_order:WF_RCPT_LINES.length,
    // computed display fields
    _prev_fine_wt:prev.prev_fine,
    _bal_fine_wt:parseFloat((t.estimate_fine_wt-prev.prev_fine).toFixed(3)),
    _est_amount:null,
    _prev_amount:prev.prev_amt,
    _bal_amount:null,
    _avg_fine_rate:t.avg_fine_rate||null,
  });
  closeModal();
  renderRcptLinesGrid();
}

async function saveGoldReceipt(){
  // Read header fields
  const partyType=document.getElementById('rcpt_party_type').value||'customer';
  const partyId=document.getElementById('rcpt_party_id').value||null;
  const partyName=partyType==='other'
    ?(document.getElementById('rcpt_party_other').value||'')
    :(document.getElementById('rcpt_party_q').value||'');
  if(!partyName&&!partyId){toast('Select a party name',false);return;}
  const rcptDate=document.getElementById('rcpt_date').value||today();
  const goldWt=parseIN(document.getElementById('rcpt_gold_wt').value)||null;
  const purity=parseIN(document.getElementById('rcpt_purity').value)||null;
  const fineWt=parseIN(document.getElementById('rcpt_fine_wt').value)||null;
  const rate=parseIN(document.getElementById('rcpt_rate').value)||null;
  const amount=parseIN(document.getElementById('rcpt_amount').value)||null;
  const concept=document.getElementById('rcpt_concept').value||'open';
  try{
    // Generate receipt number if new
    let rcptNo=WF_RCPT_ID?null:'RCP-'+today().replace(/-/g,'').slice(2)+'-'+String(Date.now()).slice(-4);
    const hdr={receipt_date:rcptDate,party_type:partyType,party_id:partyId||null,party_name:partyName,
      receipt_gold_wt:goldWt,receipt_purity:purity,receipt_fine_wt:fineWt,
      receipt_rate:rate,receipt_amount:amount,rate_concept:concept,
  };
  if(rcptNo)hdr.receipt_no=rcptNo;
    let rcptId=WF_RCPT_ID;
    if(rcptId){await patch('gold_receipts',rcptId,hdr);}
    else{const r=await post('gold_receipts',hdr);rcptId=(Array.isArray(r)?r[0]:r).id;WF_RCPT_ID=rcptId;}
    // Save lines: delete existing and reinsert
    await delW('gold_receipt_lines','receipt_id',rcptId);
    for(let i=0;i<WF_RCPT_LINES.length;i++){
      const l=WF_RCPT_LINES[i];
      await post('gold_receipt_lines',{receipt_id:rcptId,task_id:l.task_id||null,task_code:l.task_code||null,
        item_weight:l.item_weight||null,estimate_fine_wt:l.estimate_fine_wt||null,
        gold_wt_received:l.gold_wt_received||null,gold_purity_received:l.gold_purity_received||null,
        fine_gold_received:l.fine_gold_received||null,gold_amount_conversion:l.gold_amount_conversion||false,
        receipt_amount:l.receipt_amount||null,rate_fixed:l.rate_fixed||false,fixed_rate:l.fixed_rate||null,sort_order:i});
    }
    toast('✓ Receipt saved');wfReceipts();
  }catch(e){toast('Error saving: '+e.message,false);}
}

let M_TABLE='',M_ROWS=[],M_EDIT=null,M_Q='';

async function masterTable(tbl){
  M_TABLE=tbl;M_Q='';
  const cfg=MCFG[tbl];if(!cfg){toast('Unknown master: '+tbl,false);return;}
  document.getElementById('topbar').innerHTML=`<div><div style="font-size:16px;font-weight:600">${cfg.lbl}</div><div style="font-size:11px;color:var(--tx2)">Loading…</div></div><div style="display:flex;gap:7px"><input class="inp inps" placeholder="Search…" style="width:130px" oninput="M_Q=this.value;renderMT()"><button class="btn btns bp" onclick="openMM(null)">+ Add</button></div>`;
  document.getElementById('content').innerHTML='<div style="padding:40px;text-align:center"><div class="spin"></div></div>';
  try{
    M_ROWS=await get(tbl,'order=created_at.asc');
    document.getElementById('topbar').querySelector('div div:nth-child(2)').textContent=M_ROWS.length+' records';
    renderMT();
  }catch(e){document.getElementById('content').innerHTML=`<div style="padding:32px;text-align:center;color:var(--txd)">Error loading ${cfg.lbl}: ${e.message}<br><button class="btn btns" onclick="masterTable('${tbl}')">Retry</button></div>`;}
}

function renderMT(){
  const cfg=MCFG[M_TABLE];
  const rows=M_Q?M_ROWS.filter(r=>Object.values(r).join(' ').toLowerCase().includes(M_Q.toLowerCase())):M_ROWS;
  const fc=(v,f)=>{if(f==='bool')return v?bdg('Yes','bgs','txs'):'No';if(f==='stars')return stars(v);return ec(trunc(String(v||''),25));};
  document.getElementById('content').innerHTML=
    // Toolbar: title + search + Add button
    '<div style="display:flex;align-items:center;gap:8px;padding:8px 10px;border-bottom:.5px solid var(--bdr);background:var(--bg);position:sticky;top:0;z-index:10">'
    +'<div style="font-size:14px;font-weight:700;flex:1">'+cfg.lbl+'</div>'
    +'<span style="font-size:11px;color:var(--tx2);margin-right:4px">'+M_ROWS.length+' records</span>'
    +'<input class="inp inps" placeholder="Search…" style="width:120px;font-size:12px" value="'+ec(M_Q||'')+'" oninput="M_Q=this.value;renderMT()">'
    +'<button class="btn bp" style="white-space:nowrap;padding:6px 14px;font-size:12px" onclick="openMM(null)">+ Add Item</button>'
    +'</div>'
    // Table
    +'<div class="tbl-wrap"><table><thead><tr>'+cfg.cols.map(c=>'<th>'+c.l+'</th>').join('')+'<th style="text-align:right">Actions</th></tr></thead><tbody>'
    +(rows.map(r=>'<tr>'+cfg.cols.map(c=>'<td'+(c.b?' style="font-weight:600"':'')+'>'+fc(r[c.k],c.f)+'</td>').join('')+'<td style="text-align:right;white-space:nowrap"><button class="btn btns" style="margin-right:5px" onclick="openMM(\''+r.id+'\')">Edit</button><button class="btn btns bd" onclick="delM(\''+r.id+'\')">Delete</button></td></tr>').join('')||'<tr><td colspan="'+(cfg.cols.length+1)+'" style="text-align:center;padding:28px;color:var(--tx2)">No records yet. Click \"+ Add Item\" to create one.</td></tr>')
    +'</tbody></table></div>';
}

function openMM(id){
  M_EDIT=id?M_ROWS.find(r=>r.id===id):null;
  const cfg=MCFG[M_TABLE];
  const fld=f=>{
    const v=M_EDIT?M_EDIT[f.k]:'';const i=`class="inp" id="mf_${f.k}"`;
    switch(f.t||'text'){
      case 'email':return`<input type="email" ${i} value="${ec(String(v||''))}">`;
      case 'ta':return`<textarea ${i} rows="2">${ec(String(v||''))}</textarea>`;
      case 'num':return`<input type="number" step="any" ${i} value="${v||''}">`;
      case 'readonly':return`<input type="text" class="inp" id="mf_${f.k}" value="${ec(String(v||''))}" readonly style="opacity:.6;cursor:default;background:var(--bg3)">`;
      case 'stars':{const sv=parseFloat(v)||4;return`<div style="padding:4px 0"><div style="display:flex;align-items:center;gap:10px"><input type="range" class="pri-slider" min="1" max="5" step="0.5" value="${sv}" id="mf_${f.k}" oninput="document.getElementById('sv_${f.k}').textContent=parseFloat(this.value).toFixed(1)"><span id="sv_${f.k}" style="font-size:16px;font-weight:700;color:#f0a500;min-width:28px">${sv.toFixed(1)}</span></div></div>`;}
      case 'sel':return`<select ${i}>${(f.o||[]).map((o,oi)=>`<option value="${o}"${v===o?' selected':''}>${f.ol&&f.ol[oi]?f.ol[oi]:o}</option>`).join('')}</select>`;
      case 'selm':{const sorted=(CACHE[f.m]||[]).slice().sort((a,b)=>(a[f.d]||'').localeCompare(b[f.d]||''));const navMap={categories:'m_categories',subcategories:'m_subcategories',goods:'m_goods'};const nav=navMap[f.m];return`<div style="display:flex;gap:4px;align-items:center"><select class="inp" id="mf_${f.k}" style="flex:1"><option value="">Select…</option>${sorted.map(o=>`<option value="${o.id}"${v===o.id?' selected':''}>${trunc(ec(o[f.d]),30)}</option>`).join('')}</select>${nav?`<button class="btn btns bi" style="padding:4px 8px;min-height:36px;flex-shrink:0" onclick="closeModal();setScreen('${nav}')">+</button>`:''}</div>`;}
      case 'tog':{const on=v===true;return`<div class="sw-wrap"><label class="sw"><input type="checkbox" id="mf_${f.k}" ${on?'checked':''}><span class="sw-track"></span></label><span style="font-size:13px">${on?'Active':'Inactive'}</span></div>`;}
      default:return`<input type="text" ${i} value="${ec(String(v||''))}">`;
    }
  };
  const isGold999Item=M_TABLE==='goods'&&M_EDIT&&(M_EDIT.name||'').trim().toLowerCase()==='gold 999';
  document.getElementById('modal-head').innerHTML=`<div style="font-size:15px;font-weight:600">${M_EDIT?'Edit':'Add'} ${cfg.lbl.replace(/s$/,'')}</div><div style="display:flex;gap:6px;align-items:center">${isGold999Item&&SESSION.role==='admin'?'<button class="btn btns" onclick="refreshGoldRates()" style="padding:6px 10px;font-size:13px">🔄 Gold Refresh</button>':''}  <button class="btn btns" onclick="closeModal()">✕</button></div>`;
  document.getElementById('modal-body').innerHTML=cfg.fields.map(f=>{
    const inner=`<label class="fl">${f.l}${f.r?'<span style="color:var(--txw)"> *</span>':''}</label>${fld(f)}${f.h?`<div style="font-size:10px;color:var(--tx2);margin-top:3px">${f.h}</div>`:''}<div class="err-msg" id="err_${f.k}"></div>`;
    if(f.goldonly)return`<div class="gold-only-field" style="padding:8px 10px;background:var(--bgw);border-radius:var(--r);border:.5px solid var(--bdrw)">${inner}</div>`;
    return`<div>${inner}</div>`;
  }).join('');
  document.getElementById('modal-save').style.display='';
  document.getElementById('modal-save').textContent='Save';
  document.getElementById('modal-save').onclick=saveMM;
  document.getElementById('modal-wrap').style.display='flex';
  if(M_TABLE==='goods'){
    const catSel=document.getElementById('mf_category_id');
    if(catSel){
      const toggleGoldFields=()=>{const cat=CACHE.categories.find(c=>c.id===catSel.value);const isGold=(cat==null?undefined:cat.linked_gold)||false;document.querySelectorAll('.gold-only-field').forEach(el=>{el.style.display=isGold?'':'none';});};
      catSel.addEventListener('change',toggleGoldFields);
      toggleGoldFields();
    }
  }
}

async function saveMM(){
  const cfg=MCFG[M_TABLE];const body={};let hasErr=false;
  cfg.fields.forEach(f=>{const el=document.getElementById('err_'+f.k);if(el)el.textContent='';});
  for(const f of cfg.fields){
    if(f.t==='readonly')continue;
    const el=document.getElementById('mf_'+f.k);if(!el)continue;
    const val=f.t==='tog'?el.checked:f.t==='stars'?(parseFloat(el.value)||4):(el.value||null);
    if(f.r&&!val&&f.t!=='tog'){const el2=document.getElementById('err_'+f.k);if(el2)el2.textContent='Required';hasErr=true;continue;}
    if(f.uniq&&val){const exists=M_ROWS.filter(r=>r.id!==((M_EDIT==null?undefined:M_EDIT.id))).find(r=>(r[f.k]||'').toLowerCase()===(val||'').toLowerCase());if(exists){const el2=document.getElementById('err_'+f.k);if(el2)el2.textContent=f.uniqMsg||'Already exists';hasErr=true;}}
    body[f.k]=val;
  }
  if(hasErr){toast('Please fix the errors above',false);return;}
  try{
    if(M_EDIT)await patch(M_TABLE,M_EDIT.id,body);
    else await post(M_TABLE,body);
    toast('Saved successfully');closeModal();await masterTable(M_TABLE);await loadCache();
  }catch(e){toast('Error: '+e.message,false);}
}

async function delM(id){
  if(!confirm('Delete this record permanently?'))return;
  try{await del(M_TABLE,id);toast('Deleted');await masterTable(M_TABLE);}
  catch(e){toast('Cannot delete — may be used in other records.',false);}
}

async function refreshGoldRates(){
  if(!M_EDIT||M_TABLE!=='goods'||(M_EDIT.name||'').trim().toLowerCase()!=='gold 999'){toast('Gold Refresh only works when editing "Gold 999"',false);return;}
  const g999CostRate=parseFloat(document.getElementById('mf_default_cost_rate').value)||parseFloat(M_EDIT.default_cost_rate)||0;
  const g999SaleRate=parseFloat(document.getElementById('mf_default_sale_rate').value)||parseFloat(M_EDIT.default_sale_rate)||0;
  const goldGoods=(CACHE.goods||[]).filter(g=>{if(g.id===M_EDIT.id)return false;const sc=CACHE.subcategories.find(s=>s.id===g.subcategory_id)||{};const cat=CACHE.categories.find(c=>c.id===sc.category_id)||{};return (cat.name||'').toLowerCase().includes('gold')||(cat.linked_gold===true);});
  if(!goldGoods.length){toast('No other Gold category items found',false);return;}
  if(!confirm(`Refresh ${goldGoods.length} Gold item(s) using Gold 999 rates?`))return;
  toast('Refreshing Gold items…');let updated=0;
  for(const g of goldGoods){try{const cp=parseFloat(g.cost_purity)||0;const sp=parseFloat(g.sale_purity)||0;const upd={};if(cp>0)upd.default_cost_rate=parseFloat((g999CostRate*cp/1000).toFixed(2));if(sp>0)upd.default_sale_rate=parseFloat((g999SaleRate*sp/1000).toFixed(2));if(Object.keys(upd).length)await patch('goods',g.id,upd);updated++;}catch(e){console.error('Failed for',g.name,e);}}
  await loadCache();toast('✓ Refreshed '+updated+' Gold item(s)');
}

async function stageReport(type){
  const cfg=RCFG[type];
  document.getElementById('topbar').innerHTML=rptToolbar(cfg.title)+'<button class="btn btns bi" onclick="reportWAShare()" title="Share on WhatsApp" style="font-size:16px;display:none">💬</button>';

  const aOpts=CACHE.artisans.map(a=>`<option value="${a.name}">${ec(a.name)}</option>`).join('');
  const catOpts=(CACHE.categories||[]).map(c=>`<option value="${ec(c.name)}">${ec(c.name)}</option>`).join('');
  const scOpts=(CACHE.subcategories||[]).map(s=>`<option value="${ec(s.name)}">${ec(s.name)}</option>`).join('');
  const goodsOpts=(CACHE.goods||[]).slice().sort((a,b)=>a.name.localeCompare(b.name)).map(g=>`<option value="${ec(g.name)}">${ec(g.name)}</option>`).join('');
  const view=RPT_MODE==='summary'?cfg.sv:cfg.dv;
  let q='order=receive_date.desc';if(RPT_F.from)q=`receive_date=gte.${RPT_F.from}&${q}`;if(RPT_F.to)q=`receive_date=lte.${RPT_F.to}&${q}`;
  let rows=await get(view,q);
  if(RPT_F.customer)rows=rows.filter(r=>(r.customer_name||'').toLowerCase().includes(RPT_F.customer.toLowerCase()));
  if(RPT_F.artisan)rows=rows.filter(r=>(r.artisan_name||'').toLowerCase().includes(RPT_F.artisan.toLowerCase()));

async function admSettings(){
  document.getElementById('topbar').innerHTML=`<div><div style="font-size:16px;font-weight:600">Shop settings</div></div><button class="btn btns bp" onclick="saveSettings()">Save all</button>`;
  const rows=await get('app_settings','order=category.asc,key.asc');

  var termKeys=['terms_stage1','terms_stage2','terms_stage3','terms_stage4','terms_stage5','terms_stage6'];
  var stageNames={terms_stage1:'Stage 1 — Receive Jewellery',terms_stage2:'Stage 2 — Issue to Artisan',
    terms_stage3:'Stage 3 — Issue Goods',terms_stage4:'Stage 4 — Receipt from Artisan',
    terms_stage5:'Stage 5 — Prepare Delivery',terms_stage6:'Stage 6 — Delivery'};

            :'<input class="inp" style="width:100%;font-size:12px" id="set_'+ec(r.key)+'" value="'+ec(r.value||'')+'" '+(r.key==='pin'?'type="password"':'type="text"')+'>'
          )
          +'</div>';
      }).join('')

  }).join('');

      }).join('')

  }

  document.getElementById('content').innerHTML='<div style="max-width:600px">'+__shtml
    +'<button class="btn btnp" style="width:100%;margin-top:8px" onclick="saveSettings()">💾 Save Settings</button></div>';
}

async function saveSettings(){
  const rows=await get('app_settings');
  for(const r of rows){
    var el=document.getElementById('set_'+r.key);
    if(el){
      var val=el.value;
      if(val!==r.value){
        await patch('app_settings',r.id,{value:val});
        SETTINGS[r.key]=val;
      }
    }
  }
  toast('Settings saved');
}

async function confirmDelete(taskId,taskCode,balance){
  if(balance>0){toast('Cannot delete — balance due: '+fmtc(balance),false);return;}
  const reason=prompt(`⛔ PERMANENT DELETE: ${taskCode}\n\nThis deletes ALL data (photos, ledger, stock records).\n\nEnter reason for deletion (required):`);
  if(!reason){toast('Cancelled',false);return;}
  if(!confirm(`FINAL CONFIRMATION: Permanently delete ${taskCode}? Cannot be undone.`))return;
  try{
    const snap=await get('tasks','id=eq.'+taskId);
    await delW('task_photos','task_id',taskId);await delW('inventory_issues','task_id',taskId);
    await delW('task_receipt_lines','task_id',taskId);await delW('task_sale_lines','task_id',taskId);
    await delW('ledger_transactions','task_id',taskId);await delW('customer_messages','task_id',taskId);
    await del('tasks',taskId);
    await post('admin_delete_log',{admin_name:SESSION.user,entity_type:'task',entity_id:taskId,entity_desc:taskCode,reason,snapshot:snap[0]||{},deleted_at:new Date().toISOString()});
    toast(`${taskCode} permanently deleted`);admDelete();
  }catch(e){toast('Delete failed: '+e.message,false);}
}

// Indian number format helpers
function fmtW(n,d){d=d||3;if(n==null||n==='')return '';var x=parseFloat(n)||0;return x.toFixed(d);}
function fmtAmt(n){if(n==null||n==='')return '';var x=parseFloat(n)||0;
  var s=Math.round(x*100).toString().padStart(3,'0');
  var paise=s.slice(-2),whole=s.slice(0,-2);
  var r='';var i=whole.length;
  while(i>0){var chunk=i>2&&(whole.length-i)===0?whole.slice(0,i%2||2):(i>2?whole.slice(i-2,i):whole.slice(0,i));
  if(r)r=chunk+','+r;else r=chunk;i-=(i>2?((whole.length-i)===0?i%2||2:2):i);}
  return r+'.'+paise;}
function parseW(s){return parseFloat((s||'').replace(/,/g,''))||0;}

function grCalcHeader(){
  var wt=GR_HDR.gold_wt||0;

  // Auto-calc amount if rate set
  if(GR_HDR.rate){
    GR_HDR.amount=parseFloat((GR_HDR.fine_wt*GR_HDR.rate).toFixed(2));
    var ae=document.getElementById('gr_amount');
    if(ae)ae.value=GR_HDR.amount;
  }
}

function grRenderPartyOpts(){
  var pt=GR_HDR.party_type;
  var opts=pt==='customer'?CACHE.customers:pt==='artisan'?CACHE.artisans:[];

  if(dl)dl.innerHTML=(opts||[]).map(function(o){return '<option value="'+ec(o.name)+'" data-id="'+o.id+'">';}).join('');
}

function grPartyChange(val){
  var pt=GR_HDR.party_type;

      +'<option value="N"'+(l.gold_amount_conversion!=='Y'?' selected':'')+'>N</option>'
      +'<option value="Y"'+(l.gold_amount_conversion==='Y'?' selected':'')+'>Y</option>'
      +'</select></div>'
      +'<div class="field"><label class="fl" style="font-size:9px">Receipt Amt (₹)</label>'
      +'<input type="text" class="inp" style="font-size:11px" placeholder="0.00" value="'+(l.receipt_amount||'')+'" oninput="grLineChange('+idx+',\'receipt_amount\',this.value)"></div>'
      +'<div class="field"><label class="fl" style="font-size:9px">Rate Fixed</label>'
      +'<select class="inp" style="font-size:11px" onchange="grLineChange('+idx+',\'rate_fixed\',this.value)">'
      +'<option value="N"'+(l.rate_fixed!=='Y'?' selected':'')+'>N</option>'
      +'<option value="Y"'+(l.rate_fixed==='Y'?' selected':'')+'>Y</option>'
      +'</select></div>'
      +(l.rate_fixed==='Y'?'<div class="field"><label class="fl" style="font-size:9px">Fixed Rate (₹/gm)</label>'
      +'<input type="text" class="inp" style="font-size:11px" placeholder="0.00" value="'+(l.fixed_rate||'')+'" oninput="grLineChange('+idx+',\'fixed_rate\',this.value)"></div>':'')
      +'</div>'
      +'</div>';
  }).join('');
  // Summary row
  var totFine=GR_LINES.reduce(function(s,l){return s+(parseFloat(l.fine_gold_received)||0);},0);
  var totAmt=GR_LINES.reduce(function(s,l){return s+(parseFloat(l.receipt_amount)||0);},0);
  return rows+'<div style="padding:8px;background:var(--bg2);border-radius:6px;display:flex;gap:16px;font-size:12px">'
    +'<div><span style="color:var(--tx2)">Total Fine Gold: </span><b class="mono">'+fmtW(totFine)+' gm</b></div>'
    +'<div><span style="color:var(--tx2)">Total Amount: </span><b class="mono">₹'+fmtAmt(totAmt)+'</b></div>'
    +'</div>';
}

function grLineChange(idx,field,val){
  if(!GR_LINES[idx])return;
  var l=GR_LINES[idx];
  l[field]=val;
  // Auto-calc fine gold received
  if(field==='gold_wt_received'||field==='gold_purity_received'){
    var wt=parseW(l.gold_wt_received);
    var pur=parseW(l.gold_purity_received);
    l.fine_gold_received=parseFloat((wt*pur/100).toFixed(3));
    var fe=document.getElementById('gr_fine_'+idx);
    if(fe)fe.value=fmtW(l.fine_gold_received);
  }
  GR_LINES[idx]=l;
}

function grRemoveLine(idx){
  GR_LINES.splice(idx,1);
  document.getElementById('content').innerHTML='<div style="padding:40px;text-align:center"><div class="spin"></div></div>';
  grRender();
}

// ── TASK PICKER ──
async function grOpenTaskPicker(){
  if(!GR_HDR.party_id&&GR_HDR.party_type!=='other'){
    toast('Select a party first',false);return;
  }
  document.getElementById('modal-head').innerHTML='<div style="font-size:14px;font-weight:600">Select Task</div>'
    +'<button class="btn btns" onclick="closeModal()">✕</button>';
  document.getElementById('modal-body').innerHTML='<div style="padding:20px;text-align:center"><div class="spin"></div></div>';
  document.getElementById('modal-ft-def').style.display='none';
  document.getElementById('modal-wrap').style.display='flex';

  // Load tasks for this party
  var qp=GR_HDR.party_type==='customer'?('customer_id=eq.'+GR_HDR.party_id)
    :GR_HDR.party_type==='artisan'?('artisan_id=eq.'+GR_HDR.party_id):'';
  var tasks=await get('v_tasks_for_gold_receipt',qp+'&order=receive_date.desc').catch(function(){return[];});
  // Load prev receipts for B and E calculations
  var prevLines=GR_HDR.party_id?await get('v_prev_receipt_fine_wt','party_id=eq.'+GR_HDR.party_id).catch(function(){return[];}):[];
  var prevMap={};
  (prevLines||[]).forEach(function(p){if(p.task_id)prevMap[p.task_id]={fine_wt:p.prev_fine_wt||0,amount:p.prev_amount||0};});

  // Filter out tasks already added
  var addedIds=GR_LINES.map(function(l){return l.task_id;});
  tasks=(tasks||[]).filter(function(t){return !addedIds.includes(t.id);});

  if(!tasks.length){
    document.getElementById('modal-body').innerHTML='<div style="padding:20px;text-align:center;color:var(--tx2)">No pending tasks for this party.</div>';
    return;
  }
  GR_TASKS=tasks;

  var rows=tasks.map(function(t){
    var prev=prevMap[t.id]||{fine_wt:0,amount:0};
    var estFine=parseFloat(((t.estimate_gold_wt||0)*(t.estimate_purity||0)/100).toFixed(3));
    return '<div class="card" style="margin:4px 0;padding:8px;border:.5px solid var(--bdr);cursor:pointer;display:flex;gap:8px;align-items:center" onclick="grAddTask(\''+t.id+'\')">'
      +(t.cover_photo_url?'<img src="'+t.cover_photo_url+'" style="width:40px;height:40px;border-radius:4px;object-fit:cover;flex-shrink:0">':'<div style="width:40px;height:40px;border-radius:4px;background:var(--bg2);flex-shrink:0;display:flex;align-items:center;justify-content:center">📦</div>')
      +'<div style="flex:1;min-width:0">'
      +'<div style="font-size:12px;font-weight:600">'+ec(t.task_id)+'</div>'
      +'<div style="font-size:10px;color:var(--tx2)">'+ec(t.todo_type||'—')+'</div>'
      +'<div style="display:flex;gap:8px;font-size:10px;margin-top:2px">'
      +'<span>Wt: <b>'+fmtW(t.item_weight)+'</b></span>'
      +'<span>Est Fine: <b>'+fmtW(estFine)+'</b></span>'
      +(prev.fine_wt?'<span>Prev Fine: <b>'+fmtW(prev.fine_wt)+'</b></span>':'')
      +'</div>'
      +'</div>'
      +'<div style="font-size:18px;color:var(--txs)">+</div>'
      +'</div>';
  }).join('');
  document.getElementById('modal-body').innerHTML='<div style="padding:8px">'+rows+'</div>';
}

async function grAddTask(taskId){
  var t=GR_TASKS.find(function(x){return x.id===taskId;});
  if(!t)return;
  // Load prev totals
  var prevLines=GR_HDR.party_id?await get('v_prev_receipt_fine_wt','party_id=eq.'+GR_HDR.party_id+'&task_id=eq.'+taskId).catch(function(){return[];}):[];
  var prev=(prevLines&&prevLines[0])||{prev_fine_wt:0,prev_amount:0};
  var estFine=parseFloat(((t.estimate_gold_wt||0)*(t.estimate_purity||0)/100).toFixed(3));
  GR_LINES.push({
    task_id:t.id,
    task_code:t.task_id,
    todo_type:t.todo_type||'',
    cover_photo:t.cover_photo_url||'',
    item_weight:t.item_weight||0,
    estimate_gold_wt:t.estimate_gold_wt||0,
    estimate_purity:t.estimate_purity||0,
    estimate_fine_wt:estFine,
    estimate_amount:t.estimate_amount||0,
    prev_fine_wt:parseFloat(prev.prev_fine_wt||0),
    prev_amount:parseFloat(prev.prev_amount||0),
    gold_wt_received:'',
    gold_purity_received:'',
    fine_gold_received:0,
    gold_amount_conversion:'N',
    receipt_amount:'',
    rate_fixed:'N',
    fixed_rate:'',
    line_rate_concept:GR_HDR.rate_concept
  });
  closeModal();
  grRender();
}

// ── SAVE ──
async function grSave(){
  // Validate header
  if(!GR_HDR.date){toast('Enter receipt date',false);return;}
  if(!GR_HDR.party_name){toast('Select a party',false);return;}
  if(!GR_LINES.length){toast('Add at least one task line',false);return;}
  // Sync header inputs
  var dateEl=document.getElementById('gr_date');
  var notesEl=document.getElementById('gr_notes');
  if(dateEl)GR_HDR.date=dateEl.value;
  if(notesEl)GR_HDR.notes=notesEl.value;

  // Build payload
  var hdr={
    receipt_date:GR_HDR.date,
    party_type:GR_HDR.party_type,
    party_id:GR_HDR.party_id||null,
    party_name:GR_HDR.party_name,
    receipt_gold_wt:GR_HDR.gold_wt||null,
    receipt_purity:GR_HDR.purity||null,
    receipt_fine_wt:GR_HDR.fine_wt||null,
    receipt_rate:GR_HDR.rate||null,
    receipt_amount:GR_HDR.amount||null,
    rate_concept:GR_HDR.rate_concept,
    notes:GR_HDR.notes||null,
    created_by:SESSION.user||''
  };
  try{
    var saved;
    if(GR_ID){
      await patch('gold_receipts',GR_ID,hdr);
      saved={id:GR_ID};
      await del('gold_receipt_lines','receipt_id=eq.'+GR_ID);
    }else{
      saved=(await post('gold_receipts',hdr))[0];
      GR_ID=saved.id;
    }
    // Save lines
    var linePayloads=GR_LINES.map(function(l,i){
      return {
        receipt_id:saved.id||GR_ID,
        task_id:l.task_id||null,
        task_code:l.task_code||null,
        todo_type:l.todo_type||null,
        cover_photo_url:l.cover_photo||null,
        item_weight:l.item_weight||null,
        estimate_gold_wt:l.estimate_gold_wt||null,
        estimate_purity:l.estimate_purity||null,
        estimate_fine_wt:l.estimate_fine_wt||null,
        gold_wt_received:parseW(l.gold_wt_received)||null,
        gold_purity_received:parseW(l.gold_purity_received)||null,
        fine_gold_received:l.fine_gold_received||null,
        gold_amount_conversion:l.gold_amount_conversion==='Y',
        receipt_amount:parseW(l.receipt_amount)||null,
        rate_fixed:l.rate_fixed==='Y',
        fixed_rate:parseW(l.fixed_rate)||null,
        line_rate_concept:l.line_rate_concept||GR_HDR.rate_concept,
        sort_order:i
      };
    });
    // Insert lines in batch
    for(var i=0;i<linePayloads.length;i++){
      await post('gold_receipt_lines',linePayloads[i]);
    }
    toast('Gold Receipt saved ✓');
    // Reset for new receipt
    GR_ID=null; GR_LINES=[];
    GR_HDR=Object.assign({},GR_HDR,{gold_wt:0,purity:0,fine_wt:0,rate:0,amount:0,notes:''});
    grRender();
  }catch(e){toast('Save failed: '+e.message,false);}
}

async function grfSave(){
  var r=GRF_CUR;
  if(!r.fix_date){toast('Enter date',false);return;}
  var payload={
    task_id:r.task_id||null,
    fix_date:r.fix_date,
    advance_amount:r.advance_amount||0,
    booking_amount:r.booking_amount||0,
    gold_rate_fixed:r.gold_rate_fixed||0,
    rate_type:r.rate_type||'open',
    gold_qty_fixed:r.gold_qty_fixed||0,
    remarks:r.remarks||null
  };
  try{
    if(r.id)await patch('task_gold_fixing',r.id,payload);
    else{var saved=await post('task_gold_fixing',payload);GRF_CUR.id=saved[0].id;}
    toast('Gold rate fixing saved ✓');
    setScreen('gold_rate_list');
  }catch(e){toast('Save failed: '+e.message,false);}
}

async function grfDelete(id){
  if(!confirm('Delete this gold rate fixing?'))return;
  try{await del('task_gold_fixing','id=eq.'+id);toast('Deleted');setScreen('gold_rate_list');}
  catch(e){toast('Delete failed: '+e.message,false);}
}

// QR CODE — generate + scan
// ══════════════════════════════════════

// QR data format: JCRM:{task_id}:{stage_index}
// stage_index matches WF_STAGE (0-5)

function qrDataForTask(taskId,stageIdx){
  return 'JCRM:'+taskId+':'+stageIdx;
}

// Generate QR code SVG/canvas into a container element
// Returns a promise that resolves to a data URL (PNG) for printing
function generateQR(text,size){
  size=size||160;
  return new Promise(function(resolve){
    var tmp=document.createElement('div');
    tmp.style.cssText='position:absolute;left:-9999px;top:-9999px';
    document.body.appendChild(tmp);
    try{
      new QRCode(tmp,{text:text,width:size,height:size,correctLevel:QRCode.CorrectLevel.M});
      // QRCode renders a canvas or img — get data URL
      setTimeout(function(){
        var canvas=tmp.querySelector('canvas');
        var img=tmp.querySelector('img');
        var dataUrl='';
        if(canvas)dataUrl=canvas.toDataURL('image/png');
        else if(img)dataUrl=img.src;
        document.body.removeChild(tmp);
        resolve(dataUrl);
      },100);
    }catch(e){
      document.body.removeChild(tmp);
      resolve('');
    }
  });
}

// Generate a QR img tag (data URL) for embedding in print HTML
async function qrImgTag(taskId,stageIdx,size){
  size=size||140;
  var text=qrDataForTask(taskId,stageIdx);
  var dataUrl=await generateQR(text,size);
  if(!dataUrl)return '';
  return '<img src="'+dataUrl+'" width="'+size+'" height="'+size+'" alt="QR Code" style="display:block">';
}

// Request camera permission then open QR scanner
async function reqCamAndScan(){
  if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){
    toast('Camera not supported on this device/browser',false);return;
  }
  try{
    // Check if permission already granted
    if(navigator.permissions){
      var perm=await navigator.permissions.query({name:'camera'}).catch(function(){return{state:'prompt'};});
      if(perm.state==='denied'){
        toast('Camera permission denied. Please enable it in your browser settings.',false);return;
      }
    }
    // Request permission by attempting to get stream (browser will show native permission dialog)
    var testStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
    testStream.getTracks().forEach(function(t){t.stop();}); // stop test stream
    openQRScanner(); // permission granted — open scanner
  }catch(e){
    if(e.name==='NotAllowedError'||e.name==='PermissionDeniedError'){
      toast('Camera access denied. Please allow camera permission and try again.',false);
    }else if(e.name==='NotFoundError'){
      toast('No camera found on this device.',false);
    }else{
      toast('Camera error: '+e.message,false);
    }
  }
}


var QR_ANIM=null;

function openQRScanner(){
  var wrap=document.getElementById('qr-scanner-wrap');
  if(!wrap)return;
  wrap.style.display='flex';
  document.getElementById('qr-status').textContent='Starting camera…';

  // Check if getUserMedia is available at all
  if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){
    showQRFallback('Camera API not available in this browser.');
    return;
  }

  navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'}}})
    .then(function(stream){
      QR_STREAM=stream;
      var vid=document.getElementById('qr-video');
      vid.srcObject=stream;
      vid.onloadedmetadata=function(){vid.play();};
      document.getElementById('qr-status').textContent='Point camera at a JewelCRM QR code';
      QR_ANIM=requestAnimationFrame(scanQRFrame);
    })
    .catch(function(e){
      var msg='';
      if(e.name==='NotAllowedError'||e.name==='PermissionDeniedError'){
        msg='Camera permission denied.';
        showQRFallback(msg);
      }else if(e.name==='NotFoundError'){
        showQRFallback('No camera found on this device.');
      }else{
        showQRFallback('Camera error: '+e.message);
      }
    });
}

function showQRFallback(reason){
  var statusEl=document.getElementById('qr-status');
  var vidEl=document.getElementById('qr-video');
  if(vidEl){vidEl.style.display='none';}

  // Detect browser for permission instructions
  var isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent);
  var isAndroid=/android/i.test(navigator.userAgent);
  var isSafari=/^((?!chrome|android).)*safari/i.test(navigator.userAgent);

  var howTo='';
  if(isIOS){
    howTo='On iPhone/iPad: Settings → Safari (or your browser) → Camera → Allow.';
  }else if(isAndroid){
    howTo='On Android: tap the 🔒 lock icon in the address bar → Permissions → Camera → Allow.';
  }else{
    howTo='Click the 🔒 lock/camera icon in your browser address bar and allow camera access, then try again.';
  }

  // Inject fallback UI into the scanner modal
  var body=document.querySelector('#qr-scanner-wrap .pw-body')||document.querySelector('#qr-scanner-wrap div div:nth-child(2)');
  var scannerInner=document.querySelector('#qr-scanner-wrap > div > div:last-child');
  if(scannerInner){
    scannerInner.innerHTML=
      '<div style="padding:8px 4px;text-align:center">'
      +'<div style="font-size:32px;margin-bottom:8px">🚫</div>'
      +'<div style="font-size:13px;font-weight:600;color:var(--txd);margin-bottom:6px">'+ec(reason)+'</div>'
      +'<div style="font-size:11px;color:var(--tx2);margin-bottom:14px;line-height:1.6">'+ec(howTo)+'</div>'
      +'<div style="display:flex;flex-direction:column;gap:8px">'
      +'<button class="btn bp" onclick="openQRScanner()" style="font-size:13px">🔄 Try Camera Again</button>'
      +'<label class="btn btns" style="cursor:pointer;font-size:13px">📁 Scan from Photo<input type="file" accept="image/*" style="display:none" onchange="scanQRFromFile(this)"></label>'
      +'</div>'
      +'<div style="font-size:10px;color:var(--tx3);margin-top:10px">Or scan the QR code with your phone camera app — it will open directly.</div>'
      +'</div>';
  }
  if(statusEl)statusEl.textContent='';
}

function scanQRFromFile(input){
  var file=input&&input.files&&input.files[0];
  if(!file)return;
  var reader=new FileReader();
  reader.onload=function(e){
    var img=new Image();
    img.onload=function(){
      var canvas=document.getElementById('qr-canvas');
      if(!canvas){canvas=document.createElement('canvas');document.body.appendChild(canvas);}
      canvas.width=img.width;canvas.height=img.height;
      var ctx=canvas.getContext('2d');
      ctx.drawImage(img,0,0);
      var imageData=ctx.getImageData(0,0,img.width,img.height);
      try{
        var code=jsQR(imageData.data,imageData.width,imageData.height,{inversionAttempts:'dontInvert'});
        if(code&&code.data&&code.data.startsWith('JCRM:')){
          handleQRResult(code.data);
        }else{
          var st=document.getElementById('qr-status');
          if(st)st.textContent='No JewelCRM QR code found in that image.';
        }
      }catch(err){
        var st=document.getElementById('qr-status');
        if(st)st.textContent='Could not read QR: '+err.message;
      }
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}

function closeQRScanner(){
  if(QR_ANIM){cancelAnimationFrame(QR_ANIM);QR_ANIM=null;}
  if(QR_STREAM){QR_STREAM.getTracks().forEach(function(t){t.stop();});QR_STREAM=null;}
  var vid=document.getElementById('qr-video');
  if(vid){vid.srcObject=null;}
  var wrap=document.getElementById('qr-scanner-wrap');
  if(wrap)wrap.style.display='none';
}

function scanQRFrame(){
  var vid=document.getElementById('qr-video');
  var canvas=document.getElementById('qr-canvas');
  if(!vid||!canvas||vid.readyState!==4){
    QR_ANIM=requestAnimationFrame(scanQRFrame);
    return;
  }
  canvas.width=vid.videoWidth;
  canvas.height=vid.videoHeight;
  var ctx=canvas.getContext('2d');
  ctx.drawImage(vid,0,0,canvas.width,canvas.height);
  var imageData=ctx.getImageData(0,0,canvas.width,canvas.height);
  try{
    var code=jsQR(imageData.data,imageData.width,imageData.height,{inversionAttempts:'dontInvert'});
    if(code&&code.data&&code.data.startsWith('JCRM:')){
      handleQRResult(code.data);
      return; // stop scanning
    }
  }catch(e){}
  QR_ANIM=requestAnimationFrame(scanQRFrame);
}

function handleQRResult(data){
  closeQRScanner();
  // Format: JCRM:{task_uuid}:{stage_index}
  var parts=data.split(':');
  if(parts.length<3){toast('Invalid QR code',false);return;}
  var taskId=parts.slice(1,-1).join(':'); // handle UUIDs with colons (shouldn't happen but safe)
  // Better: JCRM:{task_uuid}:{stage} — uuid has hyphens not colons
  taskId=parts[1];
  var stageIdx=parseInt(parts[2])||0;
  toast('Opening task…');
  // Find task in WF_TASKS or load it
  var existing=(WF_TASKS||[]).find(function(t){return t.id===taskId;});
  if(existing){
    setModule('workflow');
    setTimeout(function(){
      openTask(existing.id,stageIdx);
    },200);
  }else{
    // Load task from DB
    get('v_task_summary','id=eq.'+taskId).then(function(rows){
      if(!rows||!rows[0]){toast('Task not found',false);return;}
      WF_TASKS=WF_TASKS||[];
      if(!WF_TASKS.find(function(t){return t.id===taskId;}))WF_TASKS.push(rows[0]);
      setModule('workflow');
      setTimeout(function(){openTask(taskId,stageIdx);},200);
    });
  }
}

  setTimeout(function(){
    loadCache().catch(function(e){console.warn('cache:',e.message);});

    }).catch(function(e){

    });
  },0);
}
