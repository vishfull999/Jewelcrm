<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="JewelCRM">
<title>JewelCRM v1.2</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#fff;--bg2:#f7f7f5;--bg3:#f0ede8;
  --bgi:#e6f1fb;--bgs:#eaf3de;--bgw:#faeeda;--bgd:#fcebeb;--bgse:#f1eef8;
  --tx:#1a1a19;--tx2:#6b6b68;--tx3:#9a9a96;
  --txi:#185fa5;--txs:#3b6d11;--txw:#854f0b;--txd:#a32d2d;--txse:#5c3d9e;
  --bdr:rgba(0,0,0,.12);--bdr2:rgba(0,0,0,.22);--bdr3:rgba(0,0,0,.36);
  --bdri:#185fa5;--bdrs:#3b6d11;--bdrw:#854f0b;--bdrd:#a32d2d;
  --r:8px;--rl:12px;--font:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  --mono:"SF Mono","Fira Code",monospace;--touch:48px;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1c1c1a;--bg2:#252523;--bg3:#2e2e2b;
  --bgi:#0c447c;--bgs:#27500a;--bgw:#633806;--bgd:#791f1f;--bgse:#2d1a5e;
  --tx:#f0ede8;--tx2:#a8a8a4;--tx3:#6b6b68;
  --txi:#85b7eb;--txs:#97c459;--txw:#fac775;--txd:#f09595;--txse:#c4a8f0;
  --bdr:rgba(255,255,255,.12);--bdr2:rgba(255,255,255,.22);--bdr3:rgba(255,255,255,.36);
}}
body{font-family:var(--font);background:var(--bg3);color:var(--tx);font-size:14px;overscroll-behavior:none}
.tnav{position:fixed;top:0;left:0;right:0;height:48px;background:var(--bg);border-bottom:.5px solid var(--bdr);display:flex;align-items:center;padding:0 10px;z-index:200;overflow-x:auto;-webkit-overflow-scrolling:touch}
.brand{font-size:15px;font-weight:700;color:var(--txw);padding-right:10px;border-right:.5px solid var(--bdr);margin-right:6px;white-space:nowrap;cursor:pointer}
.tnb{border:none;background:transparent;padding:6px 10px;font-size:12px;font-weight:500;cursor:pointer;border-bottom:2.5px solid transparent;color:var(--tx2);font-family:var(--font);height:48px;white-space:nowrap}
.tnb.on{color:var(--txw);border-bottom-color:var(--bdrw)}



/* ═══════════════════════════════════════
   MOBILE PORTRAIT (≤640px)
   Target: 360–430px wide Android/iOS
═══════════════════════════════════════ */
@media(max-width:640px){
  html,body{max-width:100vw;overflow-x:hidden}
  .tnav{padding:0 4px;height:44px;overflow-x:auto;overflow-y:hidden}
  .tnb{padding:2px 7px;font-size:10px;height:44px}
  .brand{font-size:11px;padding-right:5px;margin-right:3px}
  
  
  
  .content{flex:1;min-height:0;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding:5px 6px 80px 6px!important;scrollbar-width:thin;scrollbar-color:rgba(128,128,128,.4) transparent}
  .content::-webkit-scrollbar{width:4px;background:transparent}
  .content::-webkit-scrollbar-thumb{background:rgba(128,128,128,.35);border-radius:4px}
  
  .stage-bar{position:sticky;top:40px;z-index:89;flex-shrink:0}
  .stage-btn{padding:6px 6px;font-size:9.5px;min-height:36px}
  .sb-lbl{font-size:10px}
  
  
  .nb.on{border-left:none;border-top-color:var(--bdrw);background:var(--bgw)}
  
  .row2{grid-template-columns:1fr!important}
  .row3{grid-template-columns:1fr!important}
  .g2,.g3,.g4{display:flex!important;flex-direction:column!important}
  .card{margin-bottom:7px}
  .card-p{padding:8px!important}
  .field{margin-bottom:8px}
  .fl{font-size:10px}
  .kcard{padding:9px 10px}.kval{font-size:17px}.klbl{font-size:9px}
  .btn{font-size:12px!important;padding:5px 10px!important;min-height:36px!important}
  .btns{padding:4px 7px!important;font-size:11px!important;min-height:28px!important}
  .bp,.bs{min-height:36px!important}
  .inp{padding:8px 9px;font-size:13px;min-height:38px}
  select.inp{min-height:38px}
  th{padding:4px 5px;font-size:9px}
  td{padding:5px 6px;font-size:11px}
  table.lines td .inp{min-height:28px;font-size:11px;padding:3px 5px}
  .modal{max-width:100%;border-radius:12px 12px 0 0}
  .modal-body{max-height:68vh;overflow-y:auto;-webkit-overflow-scrolling:touch;scrollbar-width:thin}
  .modal-body::-webkit-scrollbar{width:4px}
  .modal-body::-webkit-scrollbar-thumb{background:rgba(128,128,128,.35);border-radius:4px}
  .toast{bottom:58px;font-size:11px;padding:7px 12px;max-width:240px}
}

/* ═══════════════════════════════════════
   NARROW PORTRAIT (<420px) - e.g. iPhone SE
═══════════════════════════════════════ */
@media(max-width:420px){
  /* All inline grid-template-columns → single column */
  .content [style*="grid-template-columns"],
  .modal-body [style*="grid-template-columns"]{
    display:flex!important;flex-direction:column!important;gap:8px!important;
  }
  /* Except tiny key-value 2-col info grids */
  .content [style*="gap:4px;font-size"]{
    display:grid!important;grid-template-columns:1fr 1fr!important;
  }
  .card-p{padding:7px!important}
  /* NOTE: keep padding-bottom for bottom tabs — use 4-value padding */
  .content{padding:4px 5px 58px 5px!important}
  
  table.lines th{padding:2px 3px;font-size:8px}
  table.lines td{padding:3px 4px;font-size:10px}
  .btns{padding:3px 6px!important;font-size:10px!important;min-height:26px!important}
  .stage-btn{padding:5px 5px;font-size:9px}
  .tnb{padding:2px 5px;font-size:9px}
}

  /* Except tiny key-value 2-col info grids */
  .content [style*="gap:4px;font-size"]{
    display:grid!important;grid-template-columns:1fr 1fr!important;
  }
  .card-p{padding:7px!important}
  
  table.lines th{padding:2px 3px;font-size:8px}
  table.lines td{padding:3px 4px;font-size:10px}
  .btns{padding:3px 5px!important;font-size:10px!important;min-height:26px!important}
  .stage-btn{padding:5px 5px;font-size:9px}
  .tnb{padding:2px 5px;font-size:9px}
}

.topbar>div:first-child{min-width:0;overflow:hidden}
.content{flex:1;min-height:0;padding:12px 14px;overflow-y:auto;-webkit-overflow-scrolling:touch;scrollbar-width:thin;scrollbar-color:var(--bdr2) transparent}
.content::-webkit-scrollbar{width:4px}
.content::-webkit-scrollbar-track{background:transparent}
.content::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:4px}
.modal-body::-webkit-scrollbar{width:4px}
.modal-body::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:4px}


.nb:hover{background:var(--bg2)}
.nb.on{background:var(--bgw);color:var(--txw);border-left-color:var(--bdrw);font-weight:500}

.btn{background:transparent;border:.5px solid var(--bdr2);border-radius:var(--r);padding:8px 16px;font-size:13px;cursor:pointer;font-family:var(--font);color:var(--tx);min-height:var(--touch);display:inline-flex;align-items:center;justify-content:center;user-select:none;gap:4px}
.btn:active{transform:scale(.96)}
.btns{padding:6px 12px!important;min-height:36px!important;font-size:12px!important}
.bp{background:var(--bgw)!important;color:var(--txw)!important;border-color:var(--bdrw)!important;font-weight:500}
.bs{background:var(--bgs)!important;color:var(--txs)!important;border-color:var(--bdrs)!important}
.bi{color:var(--txi)!important;border-color:var(--bdri)!important}
.bd{color:var(--txd)!important;border-color:var(--bdrd)!important}
.bse{background:var(--bgse)!important;color:var(--txse)!important}
.inp{background:var(--bg2);border:.5px solid var(--bdr2);color:var(--tx);padding:10px 12px;border-radius:var(--r);font-family:var(--font);font-size:14px;outline:none;min-height:var(--touch);width:100%}
.inp:focus{border-color:var(--bdr3)}
.inps{min-height:36px!important;padding:6px 10px!important;font-size:13px!important}
select.inp option{background:var(--bg)}
textarea.inp{resize:vertical;min-height:80px}
.pri-wrap{display:flex;align-items:center;gap:10px;padding:4px 0}
.pri-slider{-webkit-appearance:none;appearance:none;flex:1;height:8px;border-radius:4px;background:var(--bdr2);outline:none;cursor:pointer}
.pri-slider::-webkit-slider-thumb{-webkit-appearance:none;width:30px;height:30px;border-radius:50%;background:var(--txw);cursor:pointer;border:3px solid var(--bg);box-shadow:0 2px 6px rgba(0,0,0,.25)}
.pri-slider::-moz-range-thumb{width:28px;height:28px;border-radius:50%;background:var(--txw);cursor:pointer;border:3px solid var(--bg)}
.pri-val{font-size:18px;font-weight:800;min-width:24px;text-align:center}
.seg{display:flex;background:var(--bg2);border-radius:var(--r);padding:3px;gap:2px;margin-bottom:12px}
.seg-btn{flex:1;border:none;background:transparent;padding:9px 8px;font-size:13px;cursor:pointer;border-radius:6px;color:var(--tx2);font-family:var(--font);font-weight:500;min-height:40px}
.seg-btn.on{background:var(--bg);color:var(--txw);box-shadow:0 1px 3px rgba(0,0,0,.1)}
.card{background:var(--bg);border:.5px solid var(--bdr);border-radius:var(--rl);overflow:hidden;margin-bottom:10px}
.card-p{padding:14px}
.kgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:7px;margin-bottom:12px}
.kcard{background:var(--bg);border:.5px solid var(--bdr);border-radius:var(--rl);padding:11px 12px;cursor:pointer;user-select:none}
.kcard:active{background:var(--bg2)}
.kval{font-size:19px;font-weight:500;line-height:1;margin-bottom:3px}
.klbl{font-size:10px;color:var(--tx2)}
.tbl-wrap{border:.5px solid var(--bdr);border-radius:var(--rl);overflow:hidden;overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;min-width:300px}
th{padding:8px 10px;text-align:left;font-size:10px;font-weight:600;color:var(--tx2);border-bottom:.5px solid var(--bdr);background:var(--bg2);white-space:nowrap}
td{padding:9px 10px;font-size:12px;border-bottom:.5px solid var(--bdr);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg2)}
.badge{font-size:10px;padding:3px 7px;border-radius:4px;display:inline-block;font-weight:600}
.mono{font-family:var(--mono);font-size:12px}
.spin{width:16px;height:16px;border:2px solid var(--bdr2);border-top-color:var(--txw);border-radius:50%;animation:spin .7s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:70px;right:12px;z-index:999;padding:10px 16px;border-radius:var(--r);font-size:13px;font-weight:500;display:none;border:.5px solid;box-shadow:0 2px 16px rgba(0,0,0,.2);max-width:280px}
.wa{display:inline-flex;align-items:center;gap:4px;background:#25d366;color:#fff;border:none;border-radius:var(--r);padding:8px 14px;font-size:13px;cursor:pointer;font-family:var(--font);font-weight:500;text-decoration:none;min-height:var(--touch)}
.wa:active{background:#1da851}
.field{margin-bottom:12px}
.fl{display:block;font-size:11px;color:var(--tx2);margin-bottom:4px;font-weight:500}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.sec-title{font-size:10px;font-weight:700;color:var(--tx2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px}
.sec-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.pipe-bar{height:6px;background:var(--bg2);border-radius:3px;overflow:hidden;margin-top:3px}
.pipe-fill{height:100%;border-radius:3px}
.low{background:var(--bgd)!important}
.rcard{border:.5px solid var(--bdr);border-radius:var(--rl);padding:9px 11px;margin-bottom:5px;position:relative;background:var(--bg);cursor:pointer;transition:background .1s}
.rcard:active{background:var(--bg2)}
.rcard .accent{position:absolute;left:0;top:0;bottom:0;width:4px}
.comp-card{border:.5px solid var(--bdrs);border-radius:var(--rl);padding:13px 14px;margin-bottom:8px;background:var(--bgs)}
.stage-bar{display:flex;overflow-x:auto;background:var(--bg);border-bottom:.5px solid var(--bdr);-webkit-overflow-scrolling:touch;scrollbar-width:thin;scrollbar-color:rgba(128,128,128,.3) transparent;flex-shrink:0}
.stage-bar::-webkit-scrollbar{height:3px}.stage-bar::-webkit-scrollbar-thumb{background:rgba(128,128,128,.35);border-radius:3px}
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:thin;scrollbar-color:rgba(128,128,128,.4) transparent}
.tbl-wrap::-webkit-scrollbar{height:4px}.tbl-wrap::-webkit-scrollbar-thumb{background:rgba(128,128,128,.35);border-radius:4px}
.stage-btn{border:none;background:transparent;padding:8px 12px;font-size:12px;cursor:pointer;border-bottom:2.5px solid transparent;color:var(--tx2);font-family:var(--font);white-space:nowrap;min-height:40px;font-weight:500;display:inline-flex;align-items:center;gap:3px}
.stage-btn.done{color:var(--txs)}
.stage-btn.active{color:var(--txw);border-bottom-color:var(--bdrw)}
.stage-btn.locked{color:var(--tx3)}
.sb-ico{font-size:14px}
.sb-lbl{font-size:11px}
@media(max-width:640px){
  .stage-btn{padding:6px 9px;font-size:11px;min-height:36px}
  .sb-ico{font-size:13px}.sb-lbl{font-size:10px}
}

  /* Top nav: icon-only */
  .tnb .tnb-txt{display:none}
  .tnb{padding:2px 7px!important;height:40px;font-size:18px;min-width:36px}
  .brand{font-size:0!important;padding-right:4px!important;margin-right:2px!important}
  .brand::after{content:'💎';font-size:18px}
  .tnav{height:40px;padding:0 2px;gap:0}
  /* Shell: slightly shorter for 40px nav */
  
  /* Bottom tabs: 46px on tiny phones */
  
  /* Content: NO margin-bottom on main — use padding-bottom on content */
  .content{padding:4px 4px 54px 4px!important}
  /* Stage bar */
  .stage-btn{padding:4px 7px;min-height:32px}
  .sb-lbl{font-size:9px}
  /* Topbar */
  
  /* Compact everything */
  .card-p{padding:6px!important}
  .inp{padding:6px 8px;font-size:12px;min-height:34px}
  .btn{font-size:11px!important;padding:4px 8px!important;min-height:34px!important}
  .btns{padding:3px 5px!important;font-size:10px!important;min-height:26px!important}
  .ibtn{width:30px!important;min-width:30px!important;padding:0!important;font-size:15px!important;flex-shrink:0;justify-content:center}
  
  .nb 
  .kgrid{grid-template-columns:1fr 1fr 1fr!important;gap:5px}
  .kcard{padding:7px 6px}.kval{font-size:16px}.klbl{font-size:9px}
}

.photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-top:6px}
.photo-box{aspect-ratio:1;border:.5px dashed var(--bdr2);border-radius:var(--r);overflow:hidden;position:relative;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:11px;color:var(--tx2);background:var(--bg2)}
.photo-box img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
.ovl{display:none;position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.44);align-items:flex-end;justify-content:center}
@media(min-width:641px){.ovl{align-items:center;padding:20px}}
.modal{background:var(--bg);border-radius:var(--rl) var(--rl) 0 0;width:100%;max-width:500px;display:flex;flex-direction:column;max-height:90vh;overflow:hidden}
@media(min-width:641px){.modal{border-radius:var(--rl)}}
.modal-hd{padding:14px 16px;border-bottom:.5px solid var(--bdr);display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.modal-body{padding:16px;display:flex;flex-direction:column;gap:12px;flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;scrollbar-width:thin}
.modal-body::-webkit-scrollbar{width:4px}.modal-body::-webkit-scrollbar-thumb{background:rgba(128,128,128,.35);border-radius:4px}
.modal-ft{padding:12px 16px;border-top:.5px solid var(--bdr);display:flex;gap:8px;justify-content:flex-end;flex-shrink:0}
.login-wrap{display:flex;position:fixed;inset:0;z-index:999;background:var(--bg3);align-items:center;justify-content:center;padding:20px}
.login-box{background:var(--bg);border-radius:var(--rl);padding:28px 24px;width:100%;max-width:320px;text-align:center;box-shadow:0 4px 24px rgba(0,0,0,.12)}
table.lines{min-width:500px}
table.lines td .inp{min-height:38px;font-size:12px;padding:6px 8px}
.chat-wrap{display:flex;flex-direction:column;gap:4px;padding-bottom:14px;min-height:200px}
.msg{max-width:80%;padding:9px 13px;border-radius:12px;font-size:13px;line-height:1.5}
.msg-out{background:var(--bgw);color:var(--txw);align-self:flex-end;border-bottom-right-radius:3px}
.msg-in{background:var(--bg2);color:var(--tx);align-self:flex-start;border-bottom-left-radius:3px}
.msg-note{background:var(--bgi);color:var(--txi);align-self:center;font-size:11px;border-radius:6px}
.msg-time{font-size:9px;opacity:.6;margin-top:2px}
.sw-wrap{display:flex;align-items:center;gap:10px}
.sw{position:relative;width:52px;height:30px;flex-shrink:0}
.sw input{opacity:0;width:0;height:0}
.sw-track{position:absolute;inset:0;background:var(--bdr2);border-radius:15px;cursor:pointer;transition:background .2s}
.sw input:checked+.sw-track{background:var(--txs)}
.sw-track:before{content:"";position:absolute;width:24px;height:24px;left:3px;top:3px;background:var(--bg);border-radius:50%;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.sw input:checked+.sw-track:before{transform:translateX(22px)}
/* Responsive grid utilities */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px}
/* Action bar: main actions full-width, icon buttons in a row */
.act-bar{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px;align-items:center}
.act-icons{display:flex;gap:5px;align-items:center;flex-shrink:0}
@media(max-width:640px){
  .act-bar .btn.bp,.act-bar .btn.bs{flex:1;min-width:calc(50% - 3px);font-size:12px!important}
  .act-bar .btn.btns:not(.icon-btn),.act-bar a.wa{font-size:11px!important}
}

.err-msg{font-size:10px;color:var(--txd);margin-top:2px;min-height:14px}
/* ── Owner segmented control ── */
.owner-seg{display:flex;gap:0;border:.5px solid var(--bdr);border-radius:var(--r);overflow:hidden;background:var(--bg2)}
.owner-seg-btn{flex:1;border:none;background:transparent;padding:9px 6px;font-size:12px;font-weight:500;cursor:pointer;color:var(--tx2);font-family:var(--font);transition:background .12s,color .12s;text-align:center;white-space:nowrap;min-height:40px;-webkit-tap-highlight-color:rgba(0,0,0,.08)}
.owner-seg-btn:not(:last-child){border-right:.5px solid var(--bdr)}
.owner-seg-btn.active{background:var(--bgw);color:var(--txw);font-weight:700}
.owner-seg-btn:active{background:var(--bg3)}
@media(max-width:640px){
  .owner-seg-btn{padding:10px 4px;font-size:11px;min-height:42px}
}
/* ── Searchable select widget ── */
.srch-wrap{position:relative;display:flex;gap:4px;align-items:stretch}
.srch-input{flex:1;min-width:0}
/* Drop spans full wrap width so taps always land inside */
.srch-drop{position:absolute;top:calc(100% + 2px);left:0;right:0;background:var(--bg);border:1px solid var(--bdrw);border-radius:var(--r);box-shadow:0 6px 20px rgba(0,0,0,.22);z-index:9999;max-height:220px;overflow-y:auto;display:none}
.srch-drop.open{display:block}
/* Large tap targets for mobile */
.srch-opt{padding:11px 12px;cursor:pointer;font-size:13px;border-bottom:.5px solid var(--bdr);user-select:none;-webkit-user-select:none}
.srch-opt:last-child{border-bottom:none}
.srch-opt:active,.srch-opt.sel{background:var(--bgw);color:var(--txw)}
.srch-opt.no-match{color:var(--tx2);cursor:default;font-style:italic;padding:10px 12px}
.srch-link-btn{flex-shrink:0;width:36px;min-width:36px;padding:0!important;font-size:16px;justify-content:center}
/* ── Icon button (emoji-only, square touch target) ── */

.ibtn.btns{width:32px!important;min-width:32px!important;font-size:15px!important;min-height:30px!important}
/* ── Stage action bar for mobile ── */
.s-act{display:flex;gap:5px;margin-top:10px;flex-wrap:wrap;align-items:center}
.s-act-main{display:flex;gap:5px;flex:1;min-width:0}
.s-act-icons{display:flex;gap:4px;align-items:center;flex-shrink:0}
/* Stage action bar — FIXED at bottom of viewport, always visible */
#stage-act-bar{
  position:fixed;

function switchLoginTab(tab){

// ── Auth helpers ─────────────────────────────────────────
function authFetch(path,body){
  return fetch(SB_+path,{
    method:'POST',
    headers:{'Content-Type':'application/json','apikey':ANON_KEY,'Authorization':'Bearer '+ANON_KEY},
    body:JSON.stringify(body)
  }).then(function(r){return r.json().then(function(d){return{ok:r.ok,status:r.status,data:d};});});
}

function setErr(id,msg){
  var el=document.getElementById(id);if(el)el.textContent=msg||'';
}
function setStatus(msg,color){
  var el=document.getElementById('conn-status');
  if(el){el.textContent=msg||'';el.style.color=color||'var(--tx2)';}
}

// Called after successful Supabase auth to load profile and boot app
async function onAuthSuccess(accessToken, userEmail, userName){
  setStatus('Checking access…');
  // Fetch user profile
  var res=await fetch(SB_+'/rest/v1/user_profiles?select=id,role,full_name,active,status,rejection_reason&limit=1',{
    headers:{'apikey':ANON_KEY,'Authorization':'Bearer '+accessToken}
  });
  var profiles=await res.json().catch(function(){return[];});
  var profile=Array.isArray(profiles)?profiles[0]:null;

  // No profile yet — just signed up
  if(!profile){
    showPendingScreen(userEmail||userName,'Your registration is awaiting admin approval. You will be notified once access is granted.');
    return;
  }

  // Rejected
  if(profile.status==='rejected'){
    showPendingScreen(userEmail||userName,
      'Your access request was declined.'+(profile.rejection_reason?' Reason: '+profile.rejection_reason:'')
      +' Please contact the shop admin.');
    return;
  }

  // Pending
  if(profile.status==='pending'||!profile.active){
    showPendingScreen(userEmail||userName,'Your account is pending admin approval. Please check back shortly or contact the shop admin.');
    return;
  }

  // Approved — boot app
  var udata={user:profile.full_name||userName||userEmail,role:profile.role||'staff',id:profile.id,token:accessToken};
  try{SESSION=udata;}catch(e){}
  window.SESSION=udata;
  window._loginUser=udata;
  var dot=document.getElementById('conn-dot');
  if(dot){dot.textContent='● '+udata.user;dot.style.color='#10b981';}
  document.getElementById('login-wrap').style.display='none';
  if(typeof boot==='function'){try{boot();}catch(e){console.error('boot:',e);}}
}

  document.getElementById('login-wrap').innerHTML=

    +'<div style="font-size:48px;margin-bottom:12px">⏳</div>'

    +'<div style="font-size:13px;color:var(--tx2);margin-bottom:16px;line-height:1.6">'+message+'</div>'
    +'<div style="font-size:12px;font-weight:600;color:var(--txw);margin-bottom:16px">Signed in as: '+(name||'')+'</div>'
    +'<button onclick="location.reload()" class="btn bp" style="width:100%;margin-bottom:8px">🔄 Check Again</button>'
    +'<button onclick="doSignOut()" class="btn btns" style="width:100%">Sign Out</button>'
    +'</div>';
}

function doSignOut(){
  fetch(SB_+'/auth/v1/logout',{method:'POST',headers:{'apikey':ANON_KEY,'Authorization':'Bearer '+(window._authToken||'')}}).finally(function(){location.reload();});

// ── Email + Password ─────────────────────────────────────
async function doEmailLogin(){
  var email=(document.getElementById('auth-email')||{}).value||'';
  var pass=(document.getElementById('auth-pass')||{}).value||'';
  setErr('auth-err','');
  if(!email||!pass){setErr('auth-err','Enter email and password');return;}
  setStatus('Signing in…');
  var r=await authFetch('/auth/v1/token?grant_type=password',{email,password:pass});
  if(!r.ok||r.data.error){
    setErr('auth-err',r.data.error_description||r.data.error||'Login failed');
    setStatus('');return;
  }
  await onAuthSuccess(r.data.access_token,email,r.data.user&&r.data.user.user_metadata&&r.data.user.user_metadata.full_name);
}

async function doEmailSignup(){
  var email=(document.getElementById('auth-email')||{}).value||'';
  var pass=(document.getElementById('auth-pass')||{}).value||'';

// XHR-based fetch — works on Android file:// (no CORS preflight for simple requests)
// apikey passed as URL param (not header) to avoid preflight OPTIONS which Android blocks
// ── Network helpers ──────────────────────────────────────────
// ftch: XHR wrapper — sends apikey as URL param (no preflight for DB calls)
// uploadFile: dedicated binary upload with full headers (storage has proper CORS)

function ftch(url,opts){
  return new Promise(function(resolve,reject){
    var xhr=new XMLHttpRequest();
    var method=(opts&&opts.method)||'GET';
    var headers=(opts&&opts.headers)||{};
    var body=(method!=='GET'&&method!=='HEAD'&&opts&&opts.body)||null;
    // Inject apikey as URL param (avoids Authorization header preflight on DB calls)
    var finalUrl=url;
    if(typeof KEY!=='undefined'&&url.indexOf('supabase.co')>-1){
      finalUrl=url+(url.indexOf('?')>-1?'&':'?')+'apikey='+KEY;
    }
    xhr.open(method,finalUrl,true);
    // Content-Type: use from opts if provided, else application/json for non-GET
    var ct=headers['Content-Type']||headers['content-type'];
    if(method!=='GET'&&method!=='HEAD'){
      if(ct&&ct!=='application/json'){
        xhr.setRequestHeader('Content-Type',ct);  // file upload etc
      }else{
        xhr.setRequestHeader('Content-Type','application/json');
      }
      if(headers['Prefer'])xhr.setRequestHeader('Prefer',headers['Prefer']);
      if(headers['x-upsert'])xhr.setRequestHeader('x-upsert',headers['x-upsert']);
    }
    // Add Authorization for storage endpoints (they have proper CORS allowing *)
    if(url.indexOf('/storage/v1/')>-1){
      xhr.setRequestHeader('Authorization','Bearer '+KEY);
    }
    xhr.setRequestHeader('Accept','application/json');
    xhr.timeout=12000;
    xhr.ontimeout=function(){reject(new Error('Request timed out'));};
    xhr.onerror=function(){reject(new Error('Network error'));};
    xhr.onload=function(){
      var status=xhr.status;
      var ok=status>=200&&status<300;
      var text=xhr.responseText;
      resolve({
        ok:ok,status:status,statusText:xhr.statusText,
        json:function(){try{return Promise.resolve(JSON.parse(text));}catch(e){return Promise.resolve({});}},
        text:function(){return Promise.resolve(text);}
      });
    };
    xhr.send(body);
  });
}

// uploadFile: uploads a File/Blob to Supabase Storage with full auth headers
// Storage has proper CORS (* origin) so Authorization header is safe
function uploadFile(path,file){
  return new Promise(function(resolve,reject){
    var url=SB+'/storage/v1/object/task-photos/'+path;
    var xhr=new XMLHttpRequest();
    xhr.open('POST',url,true);
    xhr.setRequestHeader('Authorization','Bearer '+KEY);
    xhr.setRequestHeader('apikey',KEY);
    xhr.setRequestHeader('Content-Type',file.type||'image/jpeg');
    xhr.setRequestHeader('x-upsert','true');
    xhr.timeout=60000; // 60s for large files
    xhr.ontimeout=function(){reject(new Error('Upload timed out'));};
    xhr.onerror=function(){reject(new Error('Upload network error — check connection'));};
    xhr.onload=function(){
      if(xhr.status>=200&&xhr.status<300){
        resolve(SB+'/storage/v1/object/public/task-photos/'+path);
      }else{
        reject(new Error('Upload failed: HTTP '+xhr.status+' '+xhr.responseText.slice(0,100)));
      }
    };
    xhr.send(file);
  });
}

  try{

function dashHome(){
  // Set topbar
  const topbar=document.getElementById('topbar');
  if(topbar)topbar.innerHTML=`<div><div style="font-size:16px;font-weight:600">Dashboard</div><div style="font-size:11px;color:var(--tx2)">${new Date().toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long'})}</div></div><button class="btn btns bp" id="dash-refresh-btn" onclick="dashRefresh()">↻ Refresh</button>`;
  // Render immediately (may show zeros if data not loaded yet)
  _renderDashContent();
  // If no dashboard data yet, kick off background load (non-blocking)
  if(!PIPELINE.length && !ACTIVITY.length){
    loadDashData().then(()=>{
      if(SCREEN==='dash_home')_renderDashContent();
    }).catch(e=>console.warn('dash data error:',e));
  }
}

function dashRefresh(){
  const btn=document.getElementById('dash-refresh-btn');
  if(btn){btn.textContent='…';btn.disabled=true;}
  // Reload both cache and dashboard data
  Promise.all([
    loadCache().catch(e=>console.warn('cache:',e)),
    loadDashData().catch(e=>e)
  ]).then(function(results){
    const dashErr=results[1] instanceof Error?results[1]:null;
    if(SCREEN==='dash_home'){
      _renderDashContent();
      if(dashErr){
        var s=document.getElementById('dash-status');
        if(s)s.innerHTML='<div style="padding:8px 14px;background:var(--bgd);color:var(--txd);font-size:11px;border-radius:var(--r);margin-bottom:8px">⚠ Dashboard data error: '+dashErr.message+'</div>';
      }
    }
    if(btn){btn.textContent='↻ Refresh';btn.disabled=false;}
  });
}

async function openTask(id){
  WF_CUR=WF_TASKS.find(t=>t.id===id)||await get('v_task_summary',`id=eq.${id}`).then(r=>r[0]);
  if(!WF_CUR)return;
  // Stage mapping: received→Stage2, issued_artisan→Stage2, goods_issued→Stage3, etc.
  // "received" tasks open at Stage 2 (Issue to Artisan) so user can assign artisan
  const _curSI=SIDX[WF_CUR.status]||0;
  // Allow stage override from filtered list navigation
  if(typeof window._stageOverride==='number'){
    WF_STAGE=window._stageOverride;
    window._stageOverride=undefined;
  }else{
    WF_STAGE=WF_CUR.status==='received'?1:Math.min(_curSI, STAGES.length-1);
  }
  WF_GOODS=[];WF_RCPT=[];WF_RCPT_NEW=[];WF_SALE=[];WF_SALE5=[];WF_RECV=[];WF_PHOTOS={1:{},2:{},3:{},4:{},5:{},6:{}};
  try{
    const _ot=await Promise.all([
      get('inventory_issues',`task_id=eq.${id}&order=created_at.asc`),
      get('task_receipt_lines',`task_id=eq.${id}&order=created_at.asc`),
      get('task_sale_lines',`task_id=eq.${id}&order=created_at.asc`),
      get('task_photos',`task_id=eq.${id}&order=stage.asc`),
      get('task_received_items',`task_id=eq.${id}&order=line_no.asc`),
    ]);
    const inv=_ot[0],rcpt=_ot[1],sale=_ot[2],photos=_ot[3],recv=_ot[4];
    WF_GOODS=(inv||[]).map(function(g){return Object.assign({},g,{_isGold:!!(g.purity_issued&&parseFloat(g.purity_issued)>0),_isGold999:(g.item_category||'').toLowerCase().includes('gold'),_isDiamond:(g.item_category||'').toLowerCase().includes('diamond'),_unit:g.unit||'gm',txn_date:g.txn_date||today(),txn_type:g.txn_type||'issue',owner:g.owner||'stock'});});
WF_RCPT=rcpt||[];WF_RCPT_NEW=(rcpt||[]).filter(function(r){return r.owner==='artisan';}).map(function(r){return Object.assign({},r,{good_id:r.good_id||null,wt_returned:r.wt_returned||0,cost_purity:r.cost_purity,cost_rate:r.cost_rate,cost_amount:r.cost_amount,cost_fine_gold:r.cost_fine_gold,unit:r.unit||'gm',_isGold:!!(r.cost_purity),_isDiamond:(r.unit||'')=='gm'&&!(r.cost_purity)});});
    WF_SALE=sale||[];
    WF_RECV=(recv||[]).map(r=>({scId:r.subcategory_id||'',subcat_name:r.subcategory_name||'',category_name:r.category_name||'',is_gold:r.is_gold||false,is_goldcat:(r.category_name||'').toLowerCase().includes('gold'),is_diamond:r.is_diamond||false,good_id:r.good_id||'',item_name:r.item_name||'',unit:r.unit||'gm',pcs:r.pcs||0,weight:parseFloat(r.weight)||0,purity:r.purity,fine_wt_gm:parseFloat(r.fine_wt_gm)||0,rate:parseFloat(r.rate)||0,amount:parseFloat(r.amount)||0,recv_date:r.recv_date||null}));
    [1,2,3,4,5,6].forEach(s=>{const p=(photos||[]).find(x=>x.stage===s);if(p)WF_PHOTOS[s]=p;});
    // Ensure WF_CUR always has cover photo from Stage 1 Photo 1
    if(!WF_CUR.cover_photo_url&&(WF_PHOTOS[1]||{}).photo_url_1){
      WF_CUR.cover_photo_url=(WF_PHOTOS[1]||{}).photo_url_1;
      // Persist it silently so task list shows it next time
      patch('tasks',WF_CUR.id,{cover_photo_url:(WF_PHOTOS[1]||{}).photo_url_1}).catch(()=>{});
    }
  }catch(e){console.error(e);}
  SCREEN='wf_task';renderSidebar();renderWfTopbar();renderStageBar();renderStageContent();
  // Topbar already rendered above — but if photos were loaded async, re-render to show thumb
  if(WF_CUR.cover_photo_url||(WF_PHOTOS[1]||{}).photo_url_1)renderWfTopbar();
}

  const thumb=WF_CUR.cover_photo_url||(WF_PHOTOS[1]||{}).photo_url_1||'';
  // Admin: can navigate to any stage freely; others: only up to their current status stage
  const canGoPrev=isAdmin&&WF_STAGE>0;

  document.getElementById('topbar').innerHTML=`

async function goToPrevStage(){
  if(WF_STAGE<=0)return;
  const prevIdx=WF_STAGE-1;
  const prevStatus=STAGES[prevIdx].id;
  if(!confirm(`Admin: Move task back to "${STAGES[prevIdx].full}"?\nThis will update the task status. Make sure data is correct.`))return;
  try{
    await patch('tasks',WF_CUR.id,{status:prevStatus});
    WF_CUR=Object.assign({},WF_CUR,{status:prevStatus});
    WF_STAGE=prevIdx;
    WF_TASKS=await get('v_task_summary','order=receive_date.desc');
    renderWfTopbar();renderStageBar();renderStageContent();
    toast('Moved back to '+STAGES[prevIdx].full);
  }catch(e){toast('Error: '+e.message,false);}
}

function renderStageBar(){
  const sb=document.getElementById('stage-bar');sb.style.display='flex';
  const si=SIDX[WF_CUR.status]||0;
  const isAdminNav=SESSION.role==='admin';
  sb.innerHTML=STAGES.map((s,i)=>{
    let cls='stage-btn';
    if(i<si)cls+=' done';
    else if(i===WF_STAGE)cls+=' active';
    else if(i>si)cls+=' locked';
    const clickFn=isAdminNav?`adminGoStage(${i})`:`goStage(${i})`;
    return`<button class="${cls}" onclick="${clickFn}" title="${s.full}"><span class="sb-ico">${s.ico}</span><span class="sb-lbl"> ${s.n}</span></button>`;
  }).join('');
}
function goStage(i){
  const si=SIDX[WF_CUR.status]||0;
  // Non-admin: can only view up to current status stage
  if(SESSION.role!=='admin'&&i>si)return;
  WF_STAGE=i;
  renderWfTopbar();renderStageBar();renderStageContent();
}

// Admin-only: jump freely between stages, unlock edit on previous stages
function adminGoStage(i){
  if(SESSION.role!=='admin'){toast('Admin only',false);return;}
  if(i<0||i>5)return;
  WF_STAGE=i;
  renderWfTopbar();renderStageBar();renderStageContent();
  if(i<SIDX[WF_CUR.status]){
    toast('Admin mode — you can edit this stage\'s data',false,3000);
  }
}

// ── Stage action bar: Save, Advance, Small Print, A4 Print, Share, WhatsApp ───
function stageWAUrl(){
  const t=WF_CUR;
  const art=(CACHE.artisans||[]).find(a=>a.id===t.artisan_id)||{};
  const cust=(CACHE.customers||[]).find(c=>c.id===t.customer_id)||{};
  const shop=SETTINGS.shop_name||'Jewelry Shop';
  const shopPhone=SETTINGS.shop_phone||SETTINGS.whatsapp||'';

  switch(WF_STAGE){
    case 0:{ // Stage 1 – Customer WhatsApp
      if(!cust.whatsapp)return null;
      const recvItems=(WF_RECV||[]).filter(r=>r.item_name).map(r=>'  • '+r.item_name+(r.weight?' ('+parseFloat(r.weight).toFixed(3)+' '+( r.unit||'gm')+')':'')).join('\n');
      const msg='Dear *'+cust.name+'*,\n\nThank you for visiting *'+shop+'*.\n\nWe have received your jewellery for job *'+t.task_id+'*.\n'
        +(t.todo_type?'Work: *'+t.todo_type+'*\n':'')
        +(recvItems?'Items Received:\n'+recvItems+'\n':'')
        +'Expected Delivery: *'+(t.delivery_date||'To be confirmed')+'*\n\n'
        +(shopPhone?'Contact: '+shopPhone+'\n':'')
        +'Thank you for your trust! 🙏';

    }
    case 1:{ // Stage 2 – Artisan WhatsApp
      if(!art.whatsapp)return null;
      const msg='Dear *'+art.name+'*,\n\nPlease find the job details:\n\n'
        +'Job No: *'+t.task_id+'*\n'
        +'Customer: *'+ec(t.customer_name||'')+'*\n'
        +(t.todo_type?'Work: *'+t.todo_type+'*\n':'')
        +'Issued Weight: *'+(parseFloat(t.gross_issued_wt||t.gross_weight_in||0).toFixed(3))+' gm*\n'
        +'Please complete by: *'+(t.artisan_delivery_date||t.delivery_date||'--')+'*\n'
        +(t.artisan_remarks?'Instructions: '+t.artisan_remarks+'\n':'')
        +'\nFrom *'+shop+'*';
      return waLink(art.whatsapp,msg);
    }
    case 2:{ // Stage 3 – Artisan WhatsApp (Goods Issued)
      if(!art.whatsapp)return null;
      const goodsLines=(WF_GOODS||[]).filter(g=>g.item_name).map(g=>'  • '+g.item_name+' - '+parseFloat(g.weight_issued||0).toFixed(3)+' '+(g._unit||'gm')).join('\n');
      const msg='Dear *'+art.name+'*,\n\nGoods issued for job *'+t.task_id+'*:\n'
        +(goodsLines?goodsLines+'\n':'')
        +'\nPlease complete by: *'+(t.artisan_delivery_date||t.delivery_date||'--')+'*\n'
        +(t.artisan_remarks?'Note: '+t.artisan_remarks+'\n':'')
        +'\n*'+shop+'*';
      return waLink(art.whatsapp,msg);
    }
    case 3:{ // Stage 4 – Artisan WhatsApp (Receipt)
      if(!art.whatsapp)return null;
      const rcptLines=(WF_RCPT_NEW||[]).filter(r=>r.item_name).map(r=>'  • '+r.item_name+' - Ret: '+parseFloat(r.wt_returned||0).toFixed(3)+' gm'+(r.cost_amount>0?' | ₹'+parseFloat(r.cost_amount).toFixed(2):'')).join('\n');
      const msg='Dear *'+art.name+'*,\n\nReceipt summary for job *'+t.task_id+'*:\n'
        +(rcptLines?rcptLines+'\n':'')
        +'Gross Wt Received: *'+(parseFloat(t.receipt_gross_wt||0).toFixed(3))+' gm*\n'
        +'\nFrom *'+shop+'*';
      return waLink(art.whatsapp,msg);
    }
    case 4:{ // Stage 5 – Customer WhatsApp (Ready for delivery)
      if(!cust.whatsapp)return null;
      const msg='Dear *'+cust.name+'*,\n\nYour jewellery (Job *'+t.task_id+'*) is ready for delivery! 🎉\n\n'
        +(t.todo_type?'Work Done: *'+t.todo_type+'*\n':'')
        +'Please collect at your earliest convenience.\n\n'
        +(shopPhone?'Contact: '+shopPhone+'\n':'')
        +'*'+shop+'*';
      return waLink(cust.whatsapp,msg);
    }
    case 5:{ // Stage 6 – Customer WhatsApp (Delivered)
      if(!cust.whatsapp)return null;
      const msg='Dear *'+cust.name+'*,\n\nYour jewellery (Job *'+t.task_id+'*) has been successfully delivered. ✅\n\n'
        +'Amount: *'+fmtc(parseFloat(t.total_sale_amount)||0)+'*\n\n'
        +'Thank you for choosing *'+shop+'*! We hope to see you again 🙏';
      return waLink(cust.whatsapp,msg);
    }
  }
  return null;

// WA sharing for Gold Receipt (Stage 7)
function grWAShare(){
  var t=WF_CUR||{};
  var shop=SETTINGS.shop_name||'Jewelry Shop';
  var partyName=GR_HDR.party_name||'';
  var partyPhone='';
  if(GR_HDR.party_type==='customer'){
    var cust=(CACHE.customers||[]).find(function(c){return c.id===GR_HDR.party_id;});
    partyPhone=(cust&&cust.whatsapp)||'';
  }else if(GR_HDR.party_type==='artisan'){
    var art=(CACHE.artisans||[]).find(function(a){return a.id===GR_HDR.party_id;});
    partyPhone=(art&&art.whatsapp)||'';
  }
  if(!partyPhone){toast('No WhatsApp number for this party',false);return;}
  var linesText=(GR_LINES||[]).filter(function(l){return l.task_code;}).map(function(l){
    return '  • Job *'+l.task_code+'* - Fine: '+fmtW(l.fine_gold_received)+' gm'+(l.receipt_amount?' | ₹'+parseFloat(l.receipt_amount).toFixed(2):'');
  }).join('\n');
  var msg='Dear *'+partyName+'*,\n\nGold Receipt from *'+shop+'*:\n'
    +(linesText?linesText+'\n':'')

    +'Rate Concept: *'+(GR_HDR.rate_concept||'Open')+'*\n\n'
    +'Thank you 🙏';

      +'.body{padding:20px}.sec{margin-bottom:18px}'

async function uploadPhoto(evt,stage,slot){
  const file=evt.target.files[0];if(!file)return;
  toast('Uploading photo…');
  try{
    const path=`task-${WF_CUR.id}/stage${stage}/p${slot}_${Date.now()}.jpg`;
    const url=await uploadFile(path,file);
    const existing=WF_PHOTOS[stage]||{};
    const upd={task_id:WF_CUR.id,stage,['photo_url_'+slot]:url,['photo_path_'+slot]:path};
    if(existing.id){
      await patch('task_photos',existing.id,{['photo_url_'+slot]:url});
      WF_PHOTOS[stage]=Object.assign({},existing,upd);
    }else{
      const res=await post('task_photos',upd);
      WF_PHOTOS[stage]=Array.isArray(res)?res[0]:res;
    }
    // Stage 1 slot 1 = cover photo for task list thumbnail
    if(stage===1&&slot===1){
      await patch('tasks',WF_CUR.id,{cover_photo_url:url});
      WF_CUR.cover_photo_url=url;
      // Update WF_TASKS cache so task list shows it immediately
      const ti=WF_TASKS.findIndex(t=>t.id===WF_CUR.id);
      if(ti>=0){var _t=Object.assign({},WF_TASKS[ti]);_t.cover_photo_url=url;WF_TASKS[ti]=_t;}
    }
    toast('✓ Photo saved');renderStageContent();
  }catch(e){toast('Upload failed: '+e.message,false);}
}

// Pre-fill the default "Customer Ornaments Inward" line
function initDefaultRecvItem(pcs, weight){
  const DEFAULT_ITEM_NAME = 'Customer Ornaments Inward';
  const g = (CACHE.goods||[]).find(x=>x.name===DEFAULT_ITEM_NAME);
  if(!g){
    // fallback blank line if not found in cache yet
    WF_RECV = [{scId:'',subcat_name:'Customer Ornaments',category_name:'Others',is_gold:false,is_diamond:false,good_id:'',item_name:DEFAULT_ITEM_NAME,unit:'pc',pcs:pcs||1,weight:weight||0,purity:null,fine_wt_gm:weight||0,rate:0,amount:0}];
    return;
  }
  const sc = CACHE.subcategories.find(s=>s.id===g.subcategory_id)||{};
  const cat = CACHE.categories.find(c=>c.id===sc.category_id)||{};
  const unit = g.unit||cat.default_unit||'pc';
  const w = parseFloat(weight)||0;
  WF_RECV = [{
    scId: g.subcategory_id||'',
    subcat_name: sc.name||'Customer Ornaments',
    category_name: cat.name||'Others',
    is_gold: cat.linked_gold||false,
    is_diamond: false,
    good_id: g.id,
    item_name: g.name,
    unit,
    pcs: parseInt(pcs)||1,
    weight: w,
    purity: null,
    fine_wt_gm: calcFineWt(w, false, false, null, unit),
    rate: 0,
    amount: 0
  }];
}

// New: item selected from goods dropdown sets all fields from master
function updRecvItemFull(i,sel){
  const opt=sel.options[sel.selectedIndex];
  if(!opt.value)return;
  const g=(CACHE.goods||[]).find(x=>x.id===opt.value)||{};
  const catName=opt.getAttribute('data-cat')||'';
  const isGold=opt.getAttribute('data-gold')==='1';
  const isGoldCat=(catName).toLowerCase().includes('gold');
  const isDiamond=catName.toLowerCase().includes('diamond');
  const unit=opt.getAttribute('data-unit')||g.unit||'gm';
  const scId=opt.getAttribute('data-scid')||'';
  const sc=CACHE.subcategories.find(s=>s.id===scId);
  WF_RECV[i]=Object.assign({},WF_RECV[i],{
    good_id:opt.value,item_name:g.name||opt.text,
    scId,subcat_name:(sc==null?undefined:sc.name)||'',category_name:catName,
    is_gold:isGold,is_goldcat:isGoldCat,is_diamond:isDiamond,unit,
    purity:isGoldCat?(WF_RECV[i].purity||g.cost_purity||''):null,
    fine_wt_gm:calcFineWt(WF_RECV[i].weight,isGold,isDiamond,WF_RECV[i].purity,unit)
  });
  renderRecvGrid(false);
}

function updRecvAmt(i){
  const r=WF_RECV[i];
  const wt=parseFloat(r.weight)||0;
  const rate=parseFloat(r.rate)||0;
  const amt=parseFloat((wt*rate).toFixed(2));
  WF_RECV[i].amount=amt;
  const el=document.getElementById('rgrd_amt_'+i);if(el)el.textContent=amt>0?fmtc(amt):'0';
}

function updRecvSC(i,sel){
  const scId=sel.value;
  const opt=sel.options[sel.selectedIndex];
  const catName=opt.getAttribute('data-cat')||'';
  const isGold=opt.getAttribute('data-gold')==='1';
  const isDiamond=catName.toLowerCase().includes('diamond');
  const unit=opt.getAttribute('data-unit')||'gm';
  WF_RECV[i]=Object.assign({},WF_RECV[i],{scId,subcat_name:opt.text.split(' (')[0],category_name:catName,is_gold:isGold,is_diamond:isDiamond,unit,purity:isGold?(WF_RECV[i].purity||''):null,fine_wt_gm:calcFineWt(WF_RECV[i].weight,isGold,isDiamond,WF_RECV[i].purity)});
  // reload goods for this subcategory + reset item
  WF_RECV[i].good_id='';WF_RECV[i].item_name='';
  rerenderRecv();
}

function updRecvItem(i,goodId,txt){
  const g=(CACHE.goods||[]).find(x=>x.id===goodId);
  WF_RECV[i].good_id=goodId;
  WF_RECV[i].item_name=g?g.name:txt;
  // apply default purity from goods if gold
  if(g&&WF_RECV[i].is_gold&&g.wastage_purity){WF_RECV[i].purity=g.wastage_purity;}
}

function updRecvWt(i,v){
  WF_RECV[i].weight=parseFloat(v)||0;
  WF_RECV[i].fine_wt_gm=calcFineWt(WF_RECV[i].weight,WF_RECV[i].is_gold,WF_RECV[i].is_diamond,WF_RECV[i].purity,WF_RECV[i].unit);
  const el=document.getElementById('recv_fg_'+i);if(el)el.textContent=fmt(WF_RECV[i].fine_wt_gm,3);
}

function updRecvPurity(i,v){
  WF_RECV[i].purity=parseFloat(v)||null;
  WF_RECV[i].fine_wt_gm=calcFineWt(WF_RECV[i].weight,WF_RECV[i].is_gold,WF_RECV[i].is_diamond,WF_RECV[i].purity,WF_RECV[i].unit);
  const el=document.getElementById('recv_fg_'+i);if(el)el.textContent=fmt(WF_RECV[i].fine_wt_gm,3);
}

function calcFineWt(weight,isGold,isDiamond,purity,unit){
  const w=parseFloat(weight)||0;
  if(isGold&&purity){return parseFloat((w*parseFloat(purity)/1000).toFixed(3));}
  if(isDiamond||unit==='ct'){return parseFloat((w/5).toFixed(3));} // carats → grams
  return w;
}

async function saveRecvItems(taskId){
  await delW('task_received_items','task_id',taskId);
  for(let i=0;i<WF_RECV.length;i++){
    const r=WF_RECV[i];
    if(!r.item_name)continue;
    await post('task_received_items',{task_id:taskId,line_no:i+1,subcategory_id:r.scId||null,subcategory_name:r.subcat_name||null,category_name:r.category_name||null,is_gold:r.is_gold||false,is_diamond:r.is_diamond||false,good_id:r.good_id||null,item_name:r.item_name,unit:r.unit||'gm',pcs:r.pcs||0,weight:parseFloat(r.weight)||0,purity:parseFloat(r.purity)||null,fine_wt_gm:parseFloat(r.fine_wt_gm)||0,rate:parseFloat(r.rate)||0,amount:parseFloat(r.amount)||0});
  }
}

async function loadRecvItems(taskId){
  try{
    const items=await get('task_received_items',`task_id=eq.${taskId}&order=line_no.asc`);
    WF_RECV=items.map(r=>({scId:r.subcategory_id||'',subcat_name:r.subcategory_name||'',category_name:r.category_name||'',is_gold:r.is_gold||false,is_goldcat:(r.category_name||'').toLowerCase().includes('gold'),is_diamond:r.is_diamond||false,good_id:r.good_id||'',item_name:r.item_name||'',unit:r.unit||'gm',pcs:r.pcs||0,weight:r.weight||0,purity:r.purity,fine_wt_gm:r.fine_wt_gm||0,rate:parseFloat(r.rate)||0,amount:parseFloat(r.amount)||0,recv_date:r.recv_date||null}));
  }catch(e){WF_RECV=[];}
}

function srchModalFilter(id,type){
  const q=(document.getElementById('srch_q_'+id).value||'').toLowerCase().trim();
  const items=(type==='customer'?CACHE.customers:CACHE.artisans)||[];
  const active=type==='artisan'?items.filter(x=>x.active!==false):items;
  const sorted=active.slice().sort((a,b)=>(a.name||'').localeCompare(b.name||''));
  const matches=q?sorted.filter(x=>(x.name||'').toLowerCase().includes(q)):sorted;
  srchModalRender(id,type,matches);
}

function srchModalRender(id,type,items){
  const list=document.getElementById('srch_list_'+id);
  if(!list)return;
  if(!items.length){
    list.innerHTML=`<div style="padding:18px;text-align:center;color:var(--tx2);font-size:12px">No results</div>`;
    return;

  // Build safe onclick — avoid embedding names in HTML attributes
  list.innerHTML=items.slice(0,80).map((x,i)=>`
    <div class="rcard" data-srch-id="${ec(x.id)}" data-srch-name="${ec(x.name)}"
      data-srch-target="${id}" data-srch-type="${type}"

}

function updNewEstCalc(){
  const wt=parseFloat(document.getElementById('nf_est_gold_wt').value)||0;
  const pur=parseFloat(document.getElementById('nf_est_purity').value)||0;
  const fineEl=document.getElementById('nf_est_fine_wt');
  if(fineEl&&wt>0&&pur>0)fineEl.value=parseFloat((wt*pur/1000).toFixed(3));
  const dd=document.getElementById('nf_est_purity_dd');
  if(dd&&pur>0){const m=Array.prototype.slice.call(dd.options).find(o=>Math.abs(parseFloat(o.value)-pur)<0.01);if(m)dd.value=m.value;else dd.value='';}
}

function updNewRcptFine(){
  const wt=parseIN(document.getElementById('nf_rcpt_gold_wt').value)||0;
  const pur=parseIN(document.getElementById('nf_rcpt_purity').value)||0;
  const fEl=document.getElementById('nf_rcpt_fine_gold');
  if(fEl&&wt>0&&pur>0)fEl.value=fmtIN(wt*pur/1000,3);
}

function updNewRcptAmt(){
  const rateFixedEl=document.getElementById('nf_rcpt_rate_fixed');
  const rateEl=document.getElementById('nf_rcpt_rate_booked');
  const amtEl=document.getElementById('nf_rcpt_amount');
  const isFixed=(rateFixedEl==null?undefined:rateFixedEl.value)==='Y';
  // Toggle Rate Booked
  if(rateEl){
    rateEl.disabled=!isFixed;
    rateEl.style.opacity=isFixed?'1':'0.4';
    if(!isFixed)rateEl.value='';
  }
  // Auto-calc Amount = Gold Wt × Rate Booked (only when Rate Fixed = Y)
  if(isFixed&&amtEl){
    const wt=parseIN(document.getElementById('nf_rcpt_gold_wt').value)||0;
    const rate=parseIN((rateEl==null?undefined:rateEl.value))||0;
    if(wt>0&&rate>0){
      amtEl.value=fmtIN(wt*rate,2);
    }
  }
}

async function createTask(andPrint){
  const custId=document.getElementById('nf_cust_id').value;
  if(!custId){toast('Select a customer',false);return;}
  if(!WF_RECV.filter(r=>r.item_name).length){toast('Add at least one item',false);return;}
  const pfx=SETTINGS.task_prefix||'C';
  let n=1;
  try{
    const rows=await get('tasks','order=created_at.desc&limit=1');
    if(rows&&rows.length)n=(parseInt((rows[0].task_id||pfx+'0000').replace(pfx,''))||0)+1;
  }catch(e){}
  const tid=pfx+String(n).padStart(4,'0');
  const totWtGm=WF_RECV.reduce((s,r)=>s+(r.unit==='gm'?parseFloat(r.weight)||0:0),0);
  const totPcs=WF_RECV.reduce((s,r)=>s+(r.pcs||0),0);
  const totAllWt=WF_RECV.reduce((s,r)=>s+(parseFloat(r.weight)||0),0);
  const totFineWt=WF_RECV.reduce((s,r)=>s+(parseFloat(r.fine_wt_gm)||0),0);
  const first=WF_RECV.find(r=>r.item_name)||WF_RECV[0];
  const custRem=document.getElementById('nf_crem').value||null;
  const artRem=document.getElementById('nf_arem').value||custRem;
  // Estimate fields
  const estGoldWt=parseFloat(document.getElementById('nf_est_gold_wt').value)||null;
  const estPurity=parseFloat(document.getElementById('nf_est_purity').value)||null;
  const estFineWt=parseFloat(document.getElementById('nf_est_fine_wt').value)||null;
  const estConcept=document.getElementById('nf_est_concept').value||'open';
  // Receipt fields
  const rcptGoldWt=parseIN(document.getElementById('nf_rcpt_gold_wt').value)||null;
  const rcptPurity=parseIN(document.getElementById('nf_rcpt_purity').value)||null;
  const rcptFineGold=parseIN(document.getElementById('nf_rcpt_fine_gold').value)||null;
  const rcptGoldAmtConv=document.getElementById('nf_rcpt_gold_amt_conv').value||'N';
  const rcptRateFixed=document.getElementById('nf_rcpt_rate_fixed').value||'N';
  const rcptRateBooked=parseIN(document.getElementById('nf_rcpt_rate_booked').value)||null;
  const rcptAmount=parseIN(document.getElementById('nf_rcpt_amount').value)||null;
  const rcptRemarks=document.getElementById('nf_rcpt_remarks').value||null;
  try{
    const res=await post('tasks',{
      task_id:tid,customer_id:custId,status:'received',
      receive_date:document.getElementById('nf_rdate').value||today(),
      delivery_date:document.getElementById('nf_ddate').value||deliveryDate(today(),10),
      priority:parseInt(document.getElementById('nf_pri').value)||1,
      subcategory_id:(first==null?undefined:first.scId)||null,
      sub_category:(first==null?undefined:first.subcat_name)||null,
      category:(first==null?undefined:first.category_name)||null,
      pcs_in:totPcs||1,
      gross_weight_in:totWtGm||totAllWt||0,
      total_recv_items_wt:totAllWt||0,
      total_recv_fine_wt:totFineWt||0,
      todo_type:document.getElementById('nf_todo').value||null,
      polish_type:document.getElementById('nf_pol').value||null,
      customer_remarks:custRem,
      artisan_remarks:artRem,
      estimate_gold_wt:estGoldWt,
      estimate_purity:estPurity,
      estimate_fine_wt:estFineWt,
      estimate_rate_concept:estConcept,
      rcpt_gold_wt:rcptGoldWt,
      rcpt_gold_purity:rcptPurity,
      rcpt_fine_gold:rcptFineGold,
      rcpt_gold_amt_conv:rcptGoldAmtConv,
      rcpt_rate_fixed:rcptRateFixed,
      rcpt_rate_booked:rcptRateBooked,
      rcpt_amount:rcptAmount,
      rcpt_remarks:rcptRemarks,
    });
    const newTask=Array.isArray(res)?res[0]:res;
    await saveRecvItems(newTask.id);
    // Upload any pre-captured photos
    var photoSlots=[];Object.keys(NF_PHOTOS).forEach(function(k){if(NF_PHOTOS[k])photoSlots.push([k,NF_PHOTOS[k]]);});
    if(photoSlots.length){
      toast('Uploading photos…');
      let coverUrl='';
      for(var _pi=0;_pi<photoSlots.length;_pi++){var slot=photoSlots[_pi][0],file=photoSlots[_pi][1];
        try{
          const path=`task-${newTask.id}/stage1/p${slot}_${Date.now()}`;
          const url=await uploadFile(path,file);
          const urlKey='photo_url_'+slot;
          const pathKey='photo_path_'+slot;
          const existing=await get('task_photos','task_id=eq.'+newTask.id+'&stage=eq.1').catch(()=>[]);
          const upd={task_id:newTask.id,stage:1};upd[urlKey]=url;upd[pathKey]=path;
          if(existing&&existing[0]&&existing[0].id){const u2={};u2[urlKey]=url;await patch('task_photos',existing[0].id,u2);}
          else{await post('task_photos',upd);}
          if(slot==='1'){coverUrl=url;}
        }catch(e){console.warn('Photo slot '+slot+' failed:',e.message);}
      }
      if(coverUrl)await patch('tasks',newTask.id,{cover_photo_url:coverUrl}).catch(()=>{});
    }
    toast('Task '+tid+' created!');
    WF_TASKS=await get('v_task_summary','order=receive_date.desc').catch(()=>[]);
    await openTask(newTask.id);
    if(andPrint)showRecvPrintModal();
  }catch(e){toast('Error: '+e.message,false);}
}

async function saveS1(adv,andPrint){
  const gv=function(id){var el=document.getElementById(id);return el?el.value||null:null;};
  // Validate
  var custId=gv('f_cust_id')||gv('f_cust');
  if(!custId){toast('Please select a customer',false);return;}
  var totWtCheck=WF_RECV.reduce(function(s,r){return s+(parseFloat(r.weight)||0);},0);
  if(totWtCheck<=0){toast('Please enter weight in Items Received',false);return;}
  const totWtGm=WF_RECV.reduce((s,r)=>s+(r.unit==='gm'?parseFloat(r.weight)||0:0),0);
  const totPcs=WF_RECV.reduce((s,r)=>s+(r.pcs||0),0);
  const totAllWt=WF_RECV.reduce((s,r)=>s+(parseFloat(r.weight)||0),0);
  const totFineWt=WF_RECV.reduce((s,r)=>s+(parseFloat(r.fine_wt_gm)||0),0);
  const finalGwt=totWtGm||totAllWt||0;
  const custRem=(document.getElementById('f_crem')||{}).value||null;
  const artRem=(document.getElementById('f_arem')||{}).value||null;
  const body={
    customer_id:gv('f_cust_id')||gv('f_cust'),receive_date:gv('f_rdate'),delivery_date:gv('f_ddate'),
    priority:parseInt((document.getElementById('f_pri')||{}).value)||1,
    gross_weight_in:finalGwt,
    pcs_in:totPcs||parseInt((document.getElementById('f_pcs_in')||{}).value)||1,
    total_recv_items_wt:totAllWt||finalGwt,
    total_recv_fine_wt:totFineWt,
    todo_type:gv('f_todo'),polish_type:gv('f_pol')||null,
    customer_remarks:custRem,artisan_remarks:artRem,
    status:'issued_artisan',  // always advance to issued_artisan on save
  };
  if(WF_RECV.length>0){
    const first=WF_RECV.find(function(r){return r.item_name;})||WF_RECV[0];
    body.subcategory_id=first.scId||null;
    body.sub_category=first.subcat_name||null;
    body.category=first.category_name||WF_CUR.category||null;
  }
  try{
    await patch('tasks',WF_CUR.id,body);
    await saveRecvItems(WF_CUR.id);
    WF_CUR=Object.assign({},WF_CUR,body);
    if(andPrint)await showRecvPrintModal();
    // Refresh task list and return to it
    WF_TASKS=await get('v_task_summary','order=receive_date.desc');
    WF_STAGE=0;
    toast('Saved — Issued to Artisan');
    setModule('workflow','wf_list');  // ensure module+screen both set correctly
  }catch(e){toast('Error: '+e.message,false);}
}

      </div>
      <div style="font-size:10px;color:var(--tx2);margin-top:3px">Auto-calculated — can also be edited manually</div>
    </div>

      <label class="fl">Rate Fixed Concept</label>
      <select class="inp" id="est_concept">
        <option value="open"            ${curConcept==='open'?'selected':''}>Open Rate</option>
        <option value="amount_to_gold"  ${curConcept==='amount_to_gold'?'selected':''}>Amount To Gold</option>
        <option value="gold_to_gold"    ${curConcept==='gold_to_gold'?'selected':''}>Gold To Gold</option>
        <option value="unfixed"         ${curConcept==='unfixed'?'selected':''}>Unfixed</option>
      </select>

function updEstCalc(){
  const wt=parseFloat(document.getElementById('est_gold_wt').value)||0;
  const pur=parseFloat(document.getElementById('est_purity').value)||0;
  const fineEl=document.getElementById('est_fine_wt');
  if(fineEl&&wt>0&&pur>0){
    fineEl.value=parseFloat((wt*pur/1000).toFixed(3));
  }
  // Sync dropdown to show matching purity if exists
  const dd=document.getElementById('est_purity_dd');
  if(dd&&pur>0){
    const match=Array.prototype.slice.call(dd.options).find(o=>Math.abs(parseFloat(o.value)-pur)<0.01);
    if(match)dd.value=match.value;else dd.value='';
  }
}

async function saveEstimate(){
  const taskId=(WF_CUR==null?undefined:WF_CUR.id);if(!taskId){toast('Open a task first',false);return;}
  const goldWt=parseFloat(document.getElementById('est_gold_wt').value)||null;
  const purity=parseFloat(document.getElementById('est_purity').value)||null;
  const fineWt=parseFloat(document.getElementById('est_fine_wt').value)||null;
  const concept=document.getElementById('est_concept').value||'open';
  try{
    await patch('tasks',taskId,{
      estimate_gold_wt:goldWt,
      estimate_purity:purity,
      estimate_fine_wt:fineWt,
      estimate_rate_concept:concept
    });
    WF_CUR=Object.assign({},WF_CUR,{estimate_gold_wt:goldWt,estimate_purity:purity,estimate_fine_wt:fineWt,estimate_rate_concept:concept});
    toast('✓ Estimate saved');closeModal();
    // Re-render s1 so Estimate button shows ✓ badge
    if(WF_STAGE===0)renderStageContent();
  }catch(e){toast('Error: '+e.message,false);}
}

function updGFormItemFull(sel){
  const opt=sel.options[sel.selectedIndex];if(!opt||!opt.value)return;
  const g=(CACHE.goods||[]).find(x=>x.id===opt.value)||{};
  const catName=opt.getAttribute('data-cat')||'';
  const isGold999=(catName||'').toLowerCase().includes('gold');
  const unit=opt.getAttribute('data-unit')||g.unit||'gm';
  const ubdg=document.getElementById('gf_unit_bdg');if(ubdg)ubdg.innerHTML=bdg(unit,'bgi','txi');
  const gtag=document.getElementById('gf_gold_tag');
  if(gtag){gtag.textContent=isGold999?'● Gold category — purity fields active':'Purity fields active for Gold 999 category only';gtag.style.color=isGold999?'var(--txw)':'var(--tx3)';}
  const cpEl=document.getElementById('gf_purity');
  const wpEl=document.getElementById('gf_wpurity');
  if(cpEl){cpEl.disabled=!isGold999;cpEl.style.opacity=isGold999?'1':'0.4';cpEl.placeholder=isGold999?'e.g. 916.67':'Gold 999 only';if(isGold999&&g.cost_purity&&!parseFloat(cpEl.value))cpEl.value=g.cost_purity;}
  if(wpEl){wpEl.disabled=!isGold999;wpEl.style.opacity=isGold999?'1':'0.4';wpEl.placeholder=isGold999?'e.g. 2.50':'Gold 999 only';if(isGold999&&g.cost_wastage&&!parseFloat(wpEl.value))wpEl.value=g.cost_wastage;}
  const rateEl=document.getElementById('gf_rate');
  if(rateEl&&(!rateEl.value||parseFloat(rateEl.value)===0)&&g.default_cost_rate)rateEl.value=g.default_cost_rate;
  const coEl=document.getElementById('gf_calcon');
  if(coEl&&!(WF_GOODS[G_EDIT_IDX]&&WF_GOODS[G_EDIT_IDX].calc_on))coEl.value=isGold999?'fine_wt':'bal_wt';
  // Set tab order based on gold/non-gold
  // Gold:     item → pcs → weight → cost purity → wastage purity → calc on → rate
  // Non-gold: item → pcs → weight → calc on → rate
  var pcsEl=document.getElementById('gf_pcs');
  var wtEl=document.getElementById('gf_wt');
  var calEl=document.getElementById('gf_calcon');
  if(pcsEl&&wtEl&&calEl){
    if(isGold999){
      var cpEl2=document.getElementById('gf_purity');
      var wpEl2=document.getElementById('gf_wpurity');
      pcsEl.tabIndex=1;wtEl.tabIndex=2;
      if(cpEl2)cpEl2.tabIndex=3;
      if(wpEl2)wpEl2.tabIndex=4;
      calEl.tabIndex=5;if(rateEl)rateEl.tabIndex=6;
    }else{
      pcsEl.tabIndex=1;wtEl.tabIndex=2;
      calEl.tabIndex=3;if(rateEl)rateEl.tabIndex=4;
    }
  }
  updGFormCalc();
  // Auto-focus pcs after item selection
  setTimeout(function(){var p=document.getElementById('gf_pcs');if(p)p.focus();},30);
}

function updGFormCalc(){
  var wtEl=document.getElementById('gf_wt');
  if(!wtEl)return;  // modal not open — abort
  const wt=parseFloat(wtEl.value)||0;
  const cpEl=document.getElementById('gf_purity');
  const isGold999=cpEl&&!cpEl.disabled;
  const purity=isGold999?(parseFloat(cpEl.value)||null):null;
  const goodEl=document.getElementById('gf_good');
  const checkedOpt=goodEl&&goodEl.querySelector('option:checked');
  const unit=(checkedOpt&&checkedOpt.getAttribute('data-unit'))||'gm';
  const isDiamond=unit==='ct';
  const fg=purity?parseFloat((wt*purity/1000).toFixed(3)):(isDiamond?parseFloat((wt/5).toFixed(3)):parseFloat(wt.toFixed(3)));
  const fgEl=document.getElementById('gf_fine');if(fgEl)fgEl.textContent=fmt(fg,3);
  const fgEl2=document.getElementById('gf_fine2');if(fgEl2)fgEl2.textContent=fmt(fg,3);
  const rateEl2=document.getElementById('gf_rate');
  const rate=parseFloat((rateEl2||{}).value)||0;
  const calcOnEl=document.getElementById('gf_calcon');
  const calcOn=(calcOnEl&&calcOnEl.value)||'bal_wt';
  const pcsEl=document.getElementById('gf_pcs');
  const pcs=parseInt((pcsEl||{}).value)||0;
  let amt=0;
  if(calcOn==='fine_wt')amt=parseFloat((fg*rate).toFixed(2));
  else if(calcOn==='bal_pcs')amt=parseFloat((pcs*rate).toFixed(2));
  else if(calcOn==='flat')amt=rate;
  else amt=parseFloat((wt*rate).toFixed(2));
  const amtEl=document.getElementById('gf_amt');if(amtEl)amtEl.textContent=amt>0?fmtc(amt):'--';
}

  const goodId=goodEl.value||'';

  const opt=goodEl.querySelector('option:checked');

  const calcOn=(document.getElementById('gf_calcon')||{}).value||'bal_wt';

  const fg=purity?parseFloat((wt*purity/1000).toFixed(3)):(isDiamond?parseFloat((wt/5).toFixed(3)):wt);
  let amt=0;
  if(calcOn==='fine_wt')amt=parseFloat((fg*rate).toFixed(2));
  else if(calcOn==='bal_pcs')amt=parseFloat((pcs*rate).toFixed(2));
  else if(calcOn==='flat')amt=rate;
  else amt=parseFloat((wt*rate).toFixed(2));

  // Capture carry-forward fields BEFORE touching the DOM
  const keepArtisanId=(document.getElementById('gf_artisan_id')||{}).value||'';
  const keepArtisanName=(document.getElementById('gf_artisan_q')||{}).value||'';

  const keepOwner=(document.getElementById('gf_owner')||{}).value||'stock';
  const keepType=(document.getElementById('gf_type')||{}).value||'issue';

  const line={
    artisan_id:keepArtisanId||WF_CUR.artisan_id||null,

  };

// ── Delete stage data and revert status (admin only) ──────────────────────────
async function deleteStageData(stage){
  if(SESSION.role!=='admin'){toast('Admin only',false);return;}
  const stageNames={3:'Stage 3 (Issue Goods)',4:'Stage 4 (Receipt)',5:'Stage 5 (Prepare/Sale)',6:'Stage 6 (Delivery)'};
  if(!confirm(`⚠ Admin: Delete all ${stageNames[stage]||'stage'} data for ${WF_CUR.task_id}?\nThis will revert to the previous stage. Cannot be undone.`))return;
  try{
    if(stage===3){
      await delW('inventory_issues','task_id',WF_CUR.id);
      await patch('tasks',WF_CUR.id,{status:'goods_issued'});
      WF_CUR.status='goods_issued'; WF_GOODS=[];WF_STAGE=2;
    }else if(stage===4){
      // Clear ALL in-memory unsaved data first
      WF_RCPT_NEW=[];WF_RCPT=[];WF_GRID_DATA=[];
      // Delete saved receipt lines from DB
      await delW('task_receipt_lines','task_id',WF_CUR.id);
      // Revert task status to goods_issued
      await patch('tasks',WF_CUR.id,{
        status:'goods_issued',
        receipt_gross_wt:null,receipt_pcs:null,
        artisan_wastage_wt:null,artisan_remarks:null
      });
      WF_STAGE=2;
      WF_TASKS=await get('v_task_summary','order=receive_date.desc');
      toast('Stage 4 cleared — status reverted to Issued Goods');
      setModule('workflow','wf_list');
      return;
    }else if(stage===5){
      await delW('task_sale_lines','task_id',WF_CUR.id);
      await patch('tasks',WF_CUR.id,{status:'ready_delivery',total_sale_amount:0,total_cost_amount:0});
      WF_CUR.status='ready_delivery';WF_CUR.total_sale_amount=0;WF_CUR.total_cost_amount=0;
      WF_SALE=[];WF_SALE5=[];WF_STAGE=4;
    }else if(stage===6){
      await delW('task_sale_lines','task_id',WF_CUR.id);
      await delW('task_delivery_settlement','task_id',WF_CUR.id);
      await patch('tasks',WF_CUR.id,{status:'ready_delivery',total_sale_amount:0});
      WF_CUR.status='ready_delivery';WF_CUR.total_sale_amount=0;
      WF_SALE=[];WF_SALE5=[];WF_STAGE=4;
    }
    WF_TASKS=await get('v_task_summary','order=receive_date.desc');
    const updated=WF_TASKS.find(t=>t.id===WF_CUR.id);
    if(updated)WF_CUR=Object.assign({},WF_CUR,updated||{});
    renderWfTopbar();renderStageBar();renderStageContent();
    toast(`${stageNames[stage]} data deleted — reverted to previous stage.`);
  }catch(e){toast('Delete failed: '+e.message,false);}
}

async function saveGoods(adv){
  try{
    await delW('inventory_issues','task_id',WF_CUR.id);
    for(const g of WF_GOODS){
      if(!g.item_name)continue;
      await post('inventory_issues',{
        task_id:WF_CUR.id,
        good_id:g.good_id||null,
        item_category:g.item_category||'',
        item_name:g.item_name,
        pcs_issued:parseInt(g.pcs_issued)||0,
        weight_issued:parseFloat(g.weight_issued)||0,
        purity_issued:parseFloat(g.purity_issued)||null,
        unit:g._unit||g.unit||'gm',
        cost_fine_gold:parseFloat(g.cost_fine_gold)||null,
        fine_wt_gm:parseFloat(g.cost_fine_gold)||null,
        artisan_id:g.artisan_id||WF_CUR.artisan_id,
        stage:3,
        txn_date:g.txn_date||today(),
        txn_type:g.txn_type||'issue',
        owner:g.owner||'stock',
        rate:parseFloat(g.rate)||0,
        amount:parseFloat(g.amount)||0
      });
    }
    if(adv){
      await patch('tasks',WF_CUR.id,{status:'artisan_returned'});
      WF_CUR=Object.assign({},WF_CUR,{status:'artisan_returned'});
      WF_STAGE=3;  // Stage 4 = Receipt goods (SIDX artisan_returned = 3)
      // Reload task data so Stage 4 has fresh receipt/goods data
      const fresh=await get('v_task_summary','id=eq.'+WF_CUR.id).catch(function(){return[];});
      if(fresh&&fresh[0])WF_CUR=Object.assign({},WF_CUR,fresh[0]);
    }
    WF_TASKS=await get('v_task_summary','order=receive_date.desc');
    renderWfTopbar();renderStageBar();renderStageContent();
    toast(adv?'Moved to Receipt Goods — Stage 4':'Goods saved');
  }catch(e){toast('Error: '+e.message,false);}
}

/* STAGE 4 */
function s4(){
  const t=WF_CUR,lk=SIDX[t.status]>3;
  const isAdmin=SESSION.role==='admin';
  const thumb=t.cover_photo_url||(WF_PHOTOS[1]||{}).photo_url_1||'';
  // All combined items from S1-S3 by owner
  const clientItems=WF_RECV.filter(function(r){return r.item_name;}); // owner=Client (Stage 1)
  const stockIssues=WF_GOODS.filter(g=>g.owner==='stock'&&g.txn_type==='issue');
  const stockReturns=WF_GOODS.filter(g=>g.owner==='stock'&&g.txn_type==='return');
  const artisanIssues=WF_GOODS.filter(g=>g.owner==='artisan'&&g.txn_type==='issue');
  const artisanReturns=WF_GOODS.filter(g=>g.owner==='artisan'&&g.txn_type==='return');
  // Weight calculations (convert units to gm: ct÷5)
  const toGm=(wt,unit)=>unit==='ct'?parseFloat((parseFloat(wt)/5).toFixed(3)):parseFloat(wt)||0;
  const A=clientItems.reduce((s,r)=>s+toGm(r.weight,r.unit),0); // Client weight
  const B=parseFloat(t.artisan_wastage_wt)||parseFloat((document.getElementById('f_awas')||{}).value)||0;
  const C=parseFloat((A-B).toFixed(3)); // Cust goods weight
  const D=stockIssues.reduce((s,g)=>s+toGm(g.weight_issued,g._unit||g.unit),0);
  const E=stockReturns.reduce((s,g)=>s+toGm(g.weight_issued,g._unit||g.unit),0);
  const F=artisanIssues.reduce((s,g)=>s+(parseFloat(g.cost_fine_gold)||toGm(g.weight_issued,g._unit||g.unit)),0);
  const G2=artisanReturns.reduce((s,g)=>s+(parseFloat(g.cost_fine_gold)||toGm(g.weight_issued,g._unit||g.unit)),0);
  const H=parseFloat(((C+D+F)-(E+G2)).toFixed(3));
  const recvGross=parseFloat(t.receipt_gross_wt)||0;

function updS4Calc(){
  var awasEl=document.getElementById('f_awas');
  var rgwtEl=document.getElementById('f_rgwt');
  if(!awasEl||!rgwtEl)return;  // not on Stage 4 — abort
  const awas=parseFloat(awasEl.value)||0;
  const rgwt=parseFloat(rgwtEl.value)||0;
  const toGm=(wt,unit)=>unit==='ct'?parseFloat((parseFloat(wt)/5).toFixed(3)):parseFloat(wt)||0;

  // Client items from Stage 1 (WF_RECV)
  const clientItems=WF_RECV.filter(r=>r.item_name);

  // Stage 3 goods (WF_GOODS = inventory_issues)
  const stockIssues3=WF_GOODS.filter(g=>g.owner==='stock'&&g.txn_type==='issue');
  const stockReturns3=WF_GOODS.filter(g=>g.owner==='stock'&&g.txn_type==='return');
  const artIssues3=WF_GOODS.filter(g=>g.owner==='artisan'&&g.txn_type==='issue');
  const artReturns3=WF_GOODS.filter(g=>g.owner==='artisan'&&g.txn_type==='return');

  // Stage 4 added items (WF_RCPT_NEW = task_receipt_lines)
  // All weights converted to grams (ct ÷ 5)
  const rcptWtGm=r=>{
    var unit=(r.unit||'gm').toLowerCase();
    // For issue: use issued_wt; for return: use wt_returned; balance_wt is the net
    var wt=r.txn_type==='issue'
      ?parseFloat(r.issued_wt||r.balance_wt||0)
      :parseFloat(r.wt_returned||r.return_wt||r.balance_wt||0);
    return toGm(wt,unit);
  };
  const rcptFG=r=>parseFloat(r.cost_fine_gold||0)||rcptWtGm(r);
  const rcptPcs=r=>parseInt(r.txn_type==='issue'?(r.issued_pcs||0):(r.return_pcs||r.pcs||0))||0;

  const stockIssues4=(WF_RCPT_NEW||[]).filter(r=>r.owner==='stock'&&r.txn_type==='issue');
  const stockReturns4=(WF_RCPT_NEW||[]).filter(r=>r.owner==='stock'&&r.txn_type==='return');
  const artIssues4=(WF_RCPT_NEW||[]).filter(r=>r.owner==='artisan'&&r.txn_type==='issue');
  const artReturns4=(WF_RCPT_NEW||[]).filter(r=>r.owner==='artisan'&&r.txn_type==='return');

  // (A) Client received weight
  const A=clientItems.reduce((s,r)=>s+toGm(r.weight,r.unit),0);
  // (B) Wastage
  const B=awas;
  // (C) = A - B
  const C=parseFloat((A-B).toFixed(3));
  // (D) Stock issued = Stage3 + Stage4 (all in gm)
  const D=parseFloat((
    stockIssues3.reduce((s,g)=>s+toGm(g.weight_issued,g._unit||g.unit),0)+
    stockIssues4.reduce((s,r)=>s+rcptWtGm(r),0)
  ).toFixed(3));
  // (E) Stock returned = Stage3 + Stage4 (all in gm)
  const E=parseFloat((
    stockReturns3.reduce((s,g)=>s+toGm(g.weight_issued,g._unit||g.unit),0)+
    stockReturns4.reduce((s,r)=>s+rcptWtGm(r),0)
  ).toFixed(3));
  // (F) Artisan issued fine wt = Stage3 + Stage4
  const F=parseFloat((
    artIssues3.reduce((s,g)=>s+(parseFloat(g.cost_fine_gold)||toGm(g.weight_issued,g._unit||g.unit)),0)+
    artIssues4.reduce((s,r)=>s+rcptFG(r),0)
  ).toFixed(3));
  // (G) Artisan returned fine wt = Stage3 + Stage4
  const G2=parseFloat((
    artReturns3.reduce((s,g)=>s+(parseFloat(g.cost_fine_gold)||toGm(g.weight_issued,g._unit||g.unit)),0)+
    artReturns4.reduce((s,r)=>s+rcptFG(r),0)
  ).toFixed(3));
  // (H) = C + D + F - E - G
  const H=parseFloat(((C+D+F)-(E+G2)).toFixed(3));
  // (I) Receipt gross wt - H
  const I=parseFloat((rgwt-H).toFixed(3));

  // Pcs totals
  const Apcs=clientItems.reduce((s,r)=>s+(r.pcs||0),0);
  const Dpcs=stockIssues3.reduce((s,g)=>s+(parseInt(g.pcs_issued)||0),0)+stockIssues4.reduce((s,r)=>s+rcptPcs(r),0);
  const Epcs=stockReturns3.reduce((s,g)=>s+(parseInt(g.pcs_issued)||0),0)+stockReturns4.reduce((s,r)=>s+rcptPcs(r),0);
  const Fpcs=artIssues3.reduce((s,g)=>s+(parseInt(g.pcs_issued)||0),0)+artIssues4.reduce((s,r)=>s+rcptPcs(r),0);
  const Gpcs=artReturns3.reduce((s,g)=>s+(parseInt(g.pcs_issued)||0),0)+artReturns4.reduce((s,r)=>s+rcptPcs(r),0);
  const Hpcs=(Apcs+Dpcs+Fpcs)-(Epcs+Gpcs);

  const updV=(id,v)=>{const el=document.getElementById(id);if(el)el.textContent=fmt(v,3);};
  const updP=(id,v)=>{const el=document.getElementById(id);if(el)el.textContent=v;};
  updV('s4_A',A);updV('s4_B',B);updV('s4_C',C);updV('s4_D',D);updV('s4_E',E);updV('s4_F',F);updV('s4_G',G2);updV('s4_H',H);
  updP('s4_A_pcs',Apcs);updP('s4_C_pcs',Apcs);updP('s4_D_pcs',Dpcs);updP('s4_E_pcs',Epcs);updP('s4_F_pcs',Fpcs);updP('s4_G_pcs',Gpcs);updP('s4_H_pcs',Hpcs);
  const iEl=document.getElementById('s4_I');if(iEl)iEl.textContent=fmt(I,3);
  const rwEl=document.getElementById('s4_rcptwt');if(rwEl)rwEl.textContent=fmt(H,3)+' gm';
}

// Stage 5: Compute sale rate/amount for a grid row (Stock or Artisan owner)
// Priority:
// 1. Master default_sale_rate > 0 → use it directly
// 2. add_to_cost_rate_pct > 0 → saleRate = costRate * (1 + pct/100), rounded
// 3. add_to_cost_amt_pct > 0 → saleAmt = costAmt * (1 + pct/100), rounded; saleRate = saleAmt / factor
// Returns {sale_rate, sale_amount}
function calcMarkupSaleRate(gM, costRate, costAmount, balWt, balPcs, calcOn){
  const masterSaleRate=parseFloat(gM.default_sale_rate)||0;
  const roundRate=isNaN(parseInt(gM.round_add_to_cost_rate))?2:parseInt(gM.round_add_to_cost_rate);
  const roundAmt=isNaN(parseInt(gM.round_add_to_cost_amt))?2:parseInt(gM.round_add_to_cost_amt);

  // 1. Master sale rate set
  if(masterSaleRate>0)return {sale_rate:masterSaleRate,sale_amount:parseFloat((masterSaleRate*Math.abs(balWt||1)).toFixed(2))};

  // 2. Add to Cost Rate %
  const addRatePct=parseFloat(gM.add_to_cost_rate_pct)||0;
  if(addRatePct>0&&costRate>0){
    const saleRate=parseFloat((costRate*(1+addRatePct/100)).toFixed(roundRate));
    // Compute sale amount based on calcOn
    var factor=Math.abs(balWt)||0;
    if(calcOn==='bal_pcs')factor=Math.abs(balPcs)||0;
    const saleAmt=parseFloat((saleRate*factor).toFixed(2));
    return {sale_rate:saleRate,sale_amount:saleAmt};
  }

  // 3. Add to Cost Amount % (when sale rate=0 and add_to_cost_rate_pct=0)
  const addAmtPct=parseFloat(gM.add_to_cost_amt_pct)||0;
  if(addAmtPct>0&&costAmount>0){
    const saleAmt=parseFloat((costAmount*(1+addAmtPct/100)).toFixed(roundAmt));
    // Derive rate from factor
    var denom=Math.abs(balWt)||0;
    if(calcOn==='bal_pcs')denom=Math.abs(balPcs)||0;
    const saleRate=denom>0?parseFloat((saleAmt/denom).toFixed(2)):0;
    return {sale_rate:saleRate,sale_amount:saleAmt};
  }

  return {sale_rate:0,sale_amount:0};
}

// ── Stage 4 Goods Grid helpers ────────────────────────────────────────────────
function buildGridData(){
  WF_GRID_DATA=[];
  WF_GOODS.forEach((g,gi)=>{
    const isIss=(g.txn_type||'issue')==='issue';
    const pcs=parseInt(g.pcs_issued)||0;
    const wt=parseFloat(g.weight_issued)||0;
    const gM=(CACHE.goods||[]).find(x=>x.id===g.good_id)||{};
    const stageRate=parseFloat(g.rate)||0;
    const masterRate=parseFloat(gM.default_cost_rate)||0;
    const costRate=stageRate>0?stageRate:masterRate;
    const costPurity=parseFloat(g.purity_issued)||parseFloat(gM.cost_purity)||null;
    const wastPurity=parseFloat(gM.cost_wastage)||null;
    const issPcs=isIss?pcs:0; const issWt=isIss?wt:0;
    const retPcs=isIss?0:pcs; const retWt=isIss?0:wt;
    const balPcs=issPcs-retPcs;
    const balWt=parseFloat((issWt-retWt).toFixed(3));
    const calcOn=g.calc_on||(costPurity?'fine_wt':'bal_wt');
    const row={_gi:gi,_g:g,good_id:g.good_id,item_name:g.item_name||'',owner:g.owner||'stock',unit:g.unit||gM.unit||'gm',date:g.txn_date||today(),txn_type:g.txn_type||'issue',issued_pcs:issPcs,issued_wt:issWt,return_pcs:retPcs,return_wt:retWt,balance_pcs:balPcs,balance_wt:balWt,cost_purity:costPurity,cost_wastage_purity:wastPurity,calc_on:calcOn,cost_rate:costRate,source:'goods'};
    row.fine_wt_gm=calcGridFineWt(row); row.cost_amount=calcGridAmount(row);
    // Pre-compute markup sale rate/amount for Stock/Artisan owners
    if(row.owner==='stock'||row.owner==='artisan'){
      const markup=calcMarkupSaleRate(gM,costRate,row.cost_amount,balWt,balPcs,calcOn);
      row.markup_sale_rate=markup.sale_rate;
      row.markup_sale_amount=markup.sale_amount;
    }
    WF_GRID_DATA.push(row);
  });
  WF_RCPT_NEW.forEach((r,ri)=>{
    const gM=(CACHE.goods||[]).find(x=>x.id===r.good_id)||{};
    const costPurity=parseFloat(r.cost_purity)||parseFloat(gM.cost_purity)||null;
    const wastPurity=parseFloat(r.cost_wastage_purity)||parseFloat(gM.cost_wastage)||null;
    const costRate=parseFloat(r.cost_rate)||parseFloat(gM.default_cost_rate)||0;
    const calcOn=r.calc_on||(costPurity?'fine_wt':'bal_wt');
    const issPcs=parseInt(r.issued_pcs)||0; const issWt=parseFloat(r.issued_wt)||0;
    const retPcs=parseInt(r.return_pcs||r.pcs)||0; const retWt=parseFloat(r.return_wt||r.wt_returned)||0;
    const balPcs=issPcs-retPcs; const balWt=parseFloat((issWt-retWt).toFixed(3));
    const txnType=r.txn_type||'return';
    const row={_ri:ri,_r:r,good_id:r.good_id,item_name:r.item_name||'',owner:r.owner||'artisan',unit:r.unit||'gm',date:r.txn_date||today(),txn_type:txnType,issued_pcs:issPcs,issued_wt:issWt,return_pcs:retPcs,return_wt:retWt,balance_pcs:balPcs,balance_wt:balWt,cost_purity:costPurity,cost_wastage_purity:wastPurity,calc_on:calcOn,cost_rate:costRate,source:'artisan'};
    row.fine_wt_gm=calcGridFineWt(row); row.cost_amount=calcGridAmount(row);
    if(row.owner==='artisan'||row.owner==='stock'){
      const markup=calcMarkupSaleRate(gM,costRate,row.cost_amount,balWt,balPcs,calcOn);
      row.markup_sale_rate=markup.sale_rate;
      row.markup_sale_amount=markup.sale_amount;
    }
    WF_GRID_DATA.push(row);
  });
}
function calcGridFineWt(row){
  const wt=Math.abs(row.balance_wt);
  if(row.cost_purity)return parseFloat((wt*row.cost_purity/1000).toFixed(3));
  if(row.unit==='ct')return parseFloat((wt/5).toFixed(3));
  return parseFloat(wt.toFixed(3));
}
function calcGridAmount(row){
  const rate=parseFloat(row.cost_rate)||0;
  const fg=parseFloat(row.fine_wt_gm)||0;
  const bw=Math.abs(row.balance_wt);
  switch(row.calc_on){
    case'fine_wt':return parseFloat((fg*rate).toFixed(2));
    case'bal_pcs':return parseFloat((Math.abs(row.balance_pcs)*rate).toFixed(2));
    case'flat':return rate;
    default:return parseFloat((bw*rate).toFixed(2));
  }
}
function updGridRow(gi,field,val){
  const row=WF_GRID_DATA[gi];if(!row)return;
  if(field==='cost_purity')row.cost_purity=parseFloat(val)||null;
  else if(field==='cost_wastage_purity')row.cost_wastage_purity=parseFloat(val)||null;
  else if(field==='calc_on')row.calc_on=val;
  else if(field==='cost_rate')row.cost_rate=parseFloat(val)||0;
  row.fine_wt_gm=calcGridFineWt(row); row.cost_amount=calcGridAmount(row);
  const fgEl=document.getElementById('grd_fg_'+gi);if(fgEl)fgEl.textContent=fmt(row.fine_wt_gm,3)+' gm';
  const amtEl=document.getElementById('grd_amt_'+gi);if(amtEl)amtEl.textContent=fmtc(row.cost_amount||0);
  // Sync back to source array
  if(row.source==='artisan'&&row._r){row._r.cost_purity=row.cost_purity;row._r.cost_rate=row.cost_rate;row._r.cost_amount=row.cost_amount;row._r.cost_fine_gold=row.fine_wt_gm;row._r.calc_on=row.calc_on;}
  else if(row.source==='goods'&&row._g){row._g.purity_issued=row.cost_purity;row._g.rate=row.cost_rate;row._g.amount=row.cost_amount;row._g.cost_fine_gold=row.fine_wt_gm;row._g.calc_on=row.calc_on;}
  buildS4Summary(); // also calls updS4Calc internally

async function savePartyReceipt(id,andPrint){
  var partyEl=document.getElementById('pr_party');
  var partyVal=partyEl?partyEl.value:'';
  if(!partyVal){toast('Please select a party',false);return;}
  var pts=partyVal.split(':');
  var partyType=pts[0]==='C'?'customer':'artisan';
  var partyId=pts[1];
  var partyRec=partyType==='customer'?(CACHE.customers||[]).find(function(c){return c.id===partyId;}):(CACHE.artisans||[]).find(function(a){return a.id===partyId;});
  var partyName=(partyRec||{}).name||'';
  var waPhone=(partyRec||{}).whatsapp||'';
  var body={
    receipt_date:(document.getElementById('pr_date')||{}).value||today(),
    party_type:partyType,party_id:partyId,party_name:partyName,
    receipt_amount:parseFloat((document.getElementById('pr_amount')||{}).value)||0,
    rate_fixed_type:(document.getElementById('pr_rate_type')||{}).value||'open',
    gold_fixing_id:PR_LINKED_GF_ID||null,
    notes:(document.getElementById('pr_notes')||{}).value||null,
  };
  var noEl=document.getElementById('pr_no');if(noEl&&noEl.value)body.receipt_no=noEl.value;
  try{
    var saved;
    if(id&&id!=='null'&&id!=='undefined'){await patch('party_receipts',id,body);saved=Object.assign({id:id},body);}
    else{var res=await post('party_receipts',body);saved=(res&&res[0])||body;}
    closeModal();
    PR_LIST=await get('party_receipts','order=receipt_date.desc,created_at.desc');
    renderPartyReceiptList();
    toast('Receipt saved');
    if(andPrint)openPRPrintModal(saved,waPhone);
  }catch(e){toast('Error: '+e.message,false);}
}
